// ===================== VOLUMETRIC CLOUDS WITH TYNDALL EFFECT =====================
function createVolumetricClouds() {
  const cloudGroup = new THREE.Group();
  const cloudCount = 25;

  // Cloud fragment shader with volumetric appearance
  const cloudVertShader = `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;
  const cloudFragShader = `
    uniform vec3 sunDir;
    uniform vec3 sunColor;
    uniform float time;
    varying vec2 vUv;
    varying vec3 vWorldPos;

    // Simple noise
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 5; i++) {
        v += a * noise(p);
        p *= 2.0;
        a *= 0.5;
      }
      return v;
    }

    void main() {
      vec2 uv = vUv * 2.0 - 1.0;
      float dist = length(uv);

      // Circular falloff
      float falloff = 1.0 - smoothstep(0.0, 1.0, dist);
      falloff = pow(falloff, 0.8);

      // Layered noise for volume
      vec2 noiseUV = vUv * 3.0 + time * 0.02;
      float n1 = fbm(noiseUV);
      float n2 = fbm(noiseUV * 2.0 + 1.5);
      float n3 = fbm(noiseUV * 4.0 + 3.0);

      float density = falloff * (n1 * 0.5 + n2 * 0.3 + n3 * 0.2);
      density = smoothstep(0.15, 0.7, density);

      // Lighting: sun-facing side brighter (Tyndall scattering)
      vec3 sunN = normalize(sunDir);
      float sunFacing = dot(normalize(vWorldPos), sunN) * 0.5 + 0.5;

      // Tyndall effect: bright edges where light passes through thin cloud parts
      float tyndall = pow(1.0 - density, 2.0) * sunFacing * 1.5;
      tyndall = clamp(tyndall, 0.0, 1.0);

      // Cloud base color (dark bottom, bright top)
      vec3 darkCloud = vec3(0.35, 0.38, 0.42);
      vec3 brightCloud = vec3(0.95, 0.93, 0.88);
      vec3 tyndallColor = sunColor * 1.2;

      vec3 col = mix(darkCloud, brightCloud, sunFacing * 0.7 + 0.3);
      col = mix(col, tyndallColor, tyndall * 0.5);

      // Silver lining on sun-facing edges
      float edge = smoothstep(0.3, 0.5, density) * (1.0 - smoothstep(0.5, 0.8, density));
      col += sunColor * edge * sunFacing * 0.4;

      float alpha = density * 0.75;
      if (alpha < 0.01) discard;
      gl_FragColor = vec4(col, alpha);
    }
  `;

  for (let i = 0; i < cloudCount; i++) {
    const w = 15 + Math.random() * 30;
    const h = 4 + Math.random() * 8;
    const cloudGeo = new THREE.PlaneGeometry(w, h);

    const cloudMat = new THREE.ShaderMaterial({
      uniforms: {
        sunDir: { value: sunDir },
        sunColor: { value: new THREE.Color(0xffeedd) },
        time: { value: Math.random() * 100 }
      },
      vertexShader: cloudVertShader,
      fragmentShader: cloudFragShader,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    const cloud = new THREE.Mesh(cloudGeo, cloudMat);

    // Position clouds high up, spread across sky
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 200;
    cloud.position.set(
      Math.cos(angle) * dist,
      60 + Math.random() * 80,
      Math.sin(angle) * dist
    );

    // Billboard: always face camera (will be updated in animate)
    cloud.userData.isCloud = true;
    cloud.userData.speed = 0.1 + Math.random() * 0.3;
    cloud.userData.baseX = cloud.position.x;
    cloud.userData.baseZ = cloud.position.z;

    cloudGroup.add(cloud);
  }

  // Tyndall light shafts (god rays through cloud gaps)
  const shaftCount = 8;
  for (let i = 0; i < shaftCount; i++) {
    const shaftGeo = new THREE.CylinderGeometry(0.5 + Math.random() * 2, 3 + Math.random() * 5, 80 + Math.random() * 40, 6, 1, true);
    const shaftMat = new THREE.ShaderMaterial({
      uniforms: {
        sunDir: { value: sunDir },
        sunColor: { value: new THREE.Color(0xffeedd) },
        opacity: { value: 0.03 + Math.random() * 0.04 }
      },
      vertexShader: `
        varying vec2 vUv;
        varying float vY;
        void main() {
          vUv = uv;
          vY = position.y;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 sunDir;
        uniform vec3 sunColor;
        uniform float opacity;
        varying vec2 vUv;
        varying float vY;
        void main() {
          // Fade at top and bottom
          float fade = smoothstep(-0.5, 0.0, vY) * smoothstep(0.5, 0.0, vY);
          // Fade at edges
          float edge = 1.0 - abs(vUv.x * 2.0 - 1.0);
          edge = pow(edge, 0.5);
          float a = fade * edge * opacity;
          if (a < 0.001) discard;
          gl_FragColor = vec4(sunColor, a);
        }
      `,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    });

    const shaft = new THREE.Mesh(shaftGeo, shaftMat);
    const sAngle = Math.atan2(sunDir.z, sunDir.x) + (Math.random() - 0.5) * 1.5;
    const sDist = 20 + Math.random() * 80;
    shaft.position.set(
      Math.cos(sAngle) * sDist,
      40,
      Math.sin(sAngle) * sDist
    );
    shaft.rotation.z = (Math.random() - 0.5) * 0.3;
    shaft.rotation.x = (Math.random() - 0.5) * 0.2;
    cloudGroup.add(shaft);
  }

  scene.add(cloudGroup);
  window._cloudGroup = cloudGroup;
}

// 创建碎片
function createDebris() {
  const g = new THREE.Group();
  const debrisTypes = ['crate', 'barrel', 'tire'];
  const type = debrisTypes[Math.floor(Math.random() * debrisTypes.length)];

  if (type === 'crate') {
    const crateGeo = new THREE.BoxGeometry(0.5 + Math.random() * 0.3, 0.3 + Math.random() * 0.2, 0.4 + Math.random() * 0.2);
    const crateMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.95 });
    const crate = new THREE.Mesh(crateGeo, crateMat);
    crate.rotation.set(Math.random() * 0.3, Math.random() * Math.PI, Math.random() * 0.3);
    crate.castShadow = true;
    g.add(crate);
  } else if (type === 'barrel') {
    const barrelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.6, 8);
    const barrelMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8, metalness: 0.5 });
    const barrel = new THREE.Mesh(barrelGeo, barrelMat);
    barrel.rotation.z = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
    barrel.castShadow = true;
    g.add(barrel);
  } else {
    const tireGeo = new THREE.TorusGeometry(0.3, 0.1, 8, 12);
    const tireMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.95 });
    const tire = new THREE.Mesh(tireGeo, tireMat);
    tire.rotation.x = Math.PI / 2;
    tire.castShadow = true;
    g.add(tire);
  }

  return g;
}

// 创建水坑
function createWaterPuddle() {
  const g = new THREE.Group();
  const size = 1 + Math.random() * 2;
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x3366aa,
    transparent: true,
    opacity: 0.6,
    roughness: 0.1,
    metalness: 0.8,
    side: THREE.DoubleSide
  });

  // Water surface
  const waterGeo = new THREE.CircleGeometry(size, 16);
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI / 2;
  g.add(water);

  // Mud edge
  const mudMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.95 });
  const mudGeo = new THREE.RingGeometry(size, size + 0.3, 16);
  const mud = new THREE.Mesh(mudGeo, mudMat);
  mud.rotation.x = -Math.PI / 2;
  mud.position.y = -0.01;
  g.add(mud);

  return g;
}

// 创建补给箱
function createSupplyCrate() {
  const g = new THREE.Group();
  const metalTex = createMetalTexture();
  const woodTex = createWoodTexture();

  // Main crate body
  const crateMat = new THREE.MeshStandardMaterial({ map: woodTex, color: 0x8B6914, roughness: 0.9 });
  const crate = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.6), crateMat);
  crate.castShadow = true;
  crate.receiveShadow = true;
  g.add(crate);

  // Metal edges
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.3 });
  const edgePositions = [
    [0, 0.3, 0], [0, -0.3, 0],
    [0.4, 0, 0], [-0.4, 0, 0],
    [0, 0, 0.3], [0, 0, -0.3]
  ];
  edgePositions.forEach(pos => {
    const edge = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.6), edgeMat);
    edge.position.set(...pos);
    if (pos[0] !== 0) edge.rotation.z = Math.PI / 2;
    g.add(edge);
  });

  // Lock
  const lockMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.9, roughness: 0.2 });
  const lock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.04), lockMat);
  lock.position.set(0, 0, 0.32);
  g.add(lock);

  // Label
  const labelMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 });
  const label = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.15), labelMat);
  label.position.set(0.15, 0.1, 0.31);
  g.add(label);

  return g;
}

// 创建油桶
function createBarrel() {
  const g = new THREE.Group();
  const metalTex = createMetalTexture();

  // Barrel body
  const barrelMat = new THREE.MeshStandardMaterial({ map: metalTex, color: 0x444444, roughness: 0.7, metalness: 0.6 });
  const barrelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.9, 12);
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  barrel.castShadow = true;
  barrel.receiveShadow = true;
  g.add(barrel);

  // Top rim
  const rimMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.9, roughness: 0.3 });
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.03, 8, 12), rimMat);
  rim.position.y = 0.45;
  g.add(rim);

  // Bottom rim
  const bottomRim = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.03, 8, 12), rimMat);
  bottomRim.position.y = -0.45;
  g.add(bottomRim);

  // Middle bands
  for (let i = 0; i < 2; i++) {
    const band = new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.02, 8, 12), rimMat);
    band.position.y = (i - 0.5) * 0.3;
    g.add(band);
  }

  // Hazard label
  const labelMat = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.9 });
  const label = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.2), labelMat);
  label.position.set(0, 0.1, 0.36);
  g.add(label);

  return g;
}

// 河道系统
function createRiver() {
  const mapHalf = MAP_SIZE * CELL / 2;

  // River path using spline curve - winds through the map
  const curvePoints = [
    new THREE.Vector3(-mapHalf, 0, (Math.random() - 0.5) * mapHalf * 0.6),
    new THREE.Vector3(-mapHalf * 0.5, 0, (Math.random() - 0.5) * mapHalf * 0.8),
    new THREE.Vector3(0, 0, (Math.random() - 0.5) * mapHalf * 0.4),
    new THREE.Vector3(mapHalf * 0.5, 0, (Math.random() - 0.5) * mapHalf * 0.8),
    new THREE.Vector3(mapHalf, 0, (Math.random() - 0.5) * mapHalf * 0.6)
  ];
  const riverCurve = new THREE.CatmullRomCurve3(curvePoints, false, 'catmullrom', 0.5);

  const riverWidth = 4 + Math.random() * 3;
  const segments = 80;

  // Riverbed (dark bottom)
  const bedMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.95 });
  const bedShape = new THREE.Shape();
  const bedPoints = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const p = riverCurve.getPoint(t);
    const tangent = riverCurve.getTangent(t);
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    const w = riverWidth * 0.6;
    bedPoints.push(new THREE.Vector3(p.x + normal.x * w, getTerrainHeight(p.x + normal.x * w, p.z + normal.z * w) - 0.3, p.z + normal.z * w));
  }
  // Create riverbed geometry
  const bedGeo = new THREE.BufferGeometry();
  const bedVerts = [];
  const bedIndices = [];
  for (let i = 0; i < segments; i++) {
    const t = i / segments;
    const p = riverCurve.getPoint(t);
    const tangent = riverCurve.getTangent(t);
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    const y = getTerrainHeight(p.x, p.z) - 0.3;
    const wl = riverWidth * 0.6;
    bedVerts.push(p.x - normal.x * wl, y, p.z - normal.z * wl);
    bedVerts.push(p.x + normal.x * wl, y, p.z + normal.z * wl);
  }
  for (let i = 0; i < segments - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
    bedIndices.push(a, c, b, b, c, d);
  }
  bedGeo.setAttribute('position', new THREE.Float32BufferAttribute(bedVerts, 3));
  bedGeo.setIndex(bedIndices);
  bedGeo.computeVertexNormals();
  const bed = new THREE.Mesh(bedGeo, bedMat);
  bed.receiveShadow = true;
  scene.add(bed);

  // Water surface (semi-transparent, reflective)
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x2266aa,
    transparent: true,
    opacity: 0.6,
    roughness: 0.05,
    metalness: 0.8,
    side: THREE.DoubleSide
  });
  const waterVerts = [];
  const waterIndices = [];
  for (let i = 0; i < segments; i++) {
    const t = i / segments;
    const p = riverCurve.getPoint(t);
    const tangent = riverCurve.getTangent(t);
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    const y = getTerrainHeight(p.x, p.z) - 0.05;
    waterVerts.push(p.x - normal.x * riverWidth, y, p.z - normal.z * riverWidth);
    waterVerts.push(p.x + normal.x * riverWidth, y, p.z + normal.z * riverWidth);
  }
  for (let i = 0; i < segments - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
    waterIndices.push(a, c, b, b, c, d);
  }
  const waterGeo = new THREE.BufferGeometry();
  waterGeo.setAttribute('position', new THREE.Float32BufferAttribute(waterVerts, 3));
  waterGeo.setIndex(waterIndices);
  waterGeo.computeVertexNormals();
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.receiveShadow = true;
  scene.add(water);

  // River banks (earthen edges)
  const bankMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.95 });
  for (let side = -1; side <= 1; side += 2) {
    const bankVerts = [];
    const bankIndices = [];
    for (let i = 0; i < segments; i++) {
      const t = i / segments;
      const p = riverCurve.getPoint(t);
      const tangent = riverCurve.getTangent(t);
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
      const innerY = getTerrainHeight(p.x, p.z) - 0.05;
      const outerX = p.x + normal.x * riverWidth * 1.3 * side;
      const outerZ = p.z + normal.z * riverWidth * 1.3 * side;
      const outerY = getTerrainHeight(outerX, outerZ) + 0.1;
      bankVerts.push(p.x + normal.x * riverWidth * side, innerY, p.z + normal.z * riverWidth * side);
      bankVerts.push(outerX, outerY, outerZ);
    }
    for (let i = 0; i < segments - 1; i++) {
      const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
      if (side === -1) bankIndices.push(a, b, c, b, d, c);
      else bankIndices.push(a, c, b, b, c, d);
    }
    const bankGeo = new THREE.BufferGeometry();
    bankGeo.setAttribute('position', new THREE.Float32BufferAttribute(bankVerts, 3));
    bankGeo.setIndex(bankIndices);
    bankGeo.computeVertexNormals();
    const bank = new THREE.Mesh(bankGeo, bankMat);
    bank.receiveShadow = true;
    scene.add(bank);
  }

  // Vegetation along river banks
  const reedMat = new THREE.MeshStandardMaterial({ color: 0x3a6a2a, roughness: 0.9, side: THREE.DoubleSide });
  for (let i = 0; i < 60; i++) {
    const t = Math.random();
    const p = riverCurve.getPoint(t);
    const tangent = riverCurve.getTangent(t);
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    const side = Math.random() > 0.5 ? 1 : -1;
    const dist = riverWidth * (1.0 + Math.random() * 0.5);
    const rx = p.x + normal.x * dist * side;
    const rz = p.z + normal.z * dist * side;
    const ry = getTerrainHeight(rx, rz);

    // Reed cluster
    for (let j = 0; j < 3; j++) {
      const h = 0.5 + Math.random() * 1.0;
      const reedGeo = new THREE.PlaneGeometry(0.08, h);
      const reed = new THREE.Mesh(reedGeo, reedMat);
      reed.position.set(rx + (Math.random() - 0.5) * 0.3, ry + h / 2, rz + (Math.random() - 0.5) * 0.3);
      reed.rotation.y = Math.random() * Math.PI;
      reed.rotation.z = (Math.random() - 0.5) * 0.2;
      scene.add(reed);
    }
  }

  // Store river curve for gameplay (collision, etc.)
  window._riverCurve = riverCurve;
  window._riverWidth = riverWidth;
}

function createExtractZone(x, z) {
  const g = new THREE.Group();

  // Metal pole with base
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.3 });
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 4, 8), poleMat);
  pole.position.set(x, 2, z);
  pole.castShadow = true;
  g.add(pole);

  // Pole base
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.2, 8), poleMat);
  base.position.set(x, 0.1, z);
  g.add(base);

  // Beacon light
  const beaconMat = new THREE.MeshStandardMaterial({
    color: 0x44ff44,
    emissive: 0x44ff44,
    emissiveIntensity: 1.5,
    transparent: true,
    opacity: 0.9
  });
  const beacon = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), beaconMat);
  beacon.position.set(x, 4.2, z);
  g.add(beacon);

  // Flag with pole
  const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1, 6), poleMat);
  flagPole.position.set(x, 4.5, z);
  flagPole.rotation.z = Math.PI / 2;
  g.add(flagPole);

  const flagMat = new THREE.MeshStandardMaterial({
    color: 0x44ff44,
    emissive: 0x22aa22,
    emissiveIntensity: 0.8,
    side: THREE.DoubleSide
  });
  const flag = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.5), flagMat);
  flag.position.set(x + 0.4, 4.5, z);
  g.add(flag);

  // Ground ring with pulsing effect
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x44ff44,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(new THREE.RingGeometry(2.5, 2.8, 32), ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(x, 0.05, z);
  g.add(ring);

  // Inner ring
  const innerRing = new THREE.Mesh(new THREE.RingGeometry(1.5, 1.7, 32), ringMat.clone());
  innerRing.material.opacity = 0.3;
  innerRing.rotation.x = -Math.PI / 2;
  innerRing.position.set(x, 0.06, z);
  g.add(innerRing);
  // Green smoke particles
  const smokeCount = 60;
  const smokeGeo = new THREE.BufferGeometry();
  const smokePos = new Float32Array(smokeCount * 3);
  const smokeVel = [];
  for (let i = 0; i < smokeCount; i++) {
    smokePos[i * 3] = x + (Math.random() - 0.5) * 1.5;
    smokePos[i * 3 + 1] = Math.random() * 3;
    smokePos[i * 3 + 2] = z + (Math.random() - 0.5) * 1.5;
    smokeVel.push({ vx: (Math.random() - 0.5) * 0.3, vy: 1 + Math.random() * 1.5, vz: (Math.random() - 0.5) * 0.3 });
  }
  smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePos, 3));
  const smokeMat = new THREE.PointsMaterial({ color: 0x44ff44, size: 0.6, transparent: true, opacity: 0.5, depthWrite: false });
  const smokePoints = new THREE.Points(smokeGeo, smokeMat);
  g.add(smokePoints);
  g.userData = { x, z, active: false, smoke: smokePoints, smokeVel, smokeGeo };
  return g;
}

function createBuilding(w, h, d) {
  const g = new THREE.Group();
  const concreteTex = createConcreteTexture();
  const wallColor = new THREE.Color().setHSL(0, 0, 0.2 + Math.random() * 0.15);
  const mat = new THREE.MeshStandardMaterial({ map: concreteTex, color: wallColor, roughness: 0.85 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  body.castShadow = true; body.receiveShadow = true; g.add(body);

  // Roof
  const roofGeo = new THREE.BoxGeometry(w + 0.5, 0.3, d + 0.5);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = h / 2 + 0.15;
  roof.castShadow = true;
  g.add(roof);

  // Windows with frames
  const wMat = new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xffcc66, emissiveIntensity: 0.8 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7 });
  const rows = Math.floor(h / 3), cols = Math.floor(w / 2.5);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.3) {
        const wx = (c - (cols - 1) / 2) * 2.2;
        const wy = -h / 2 + 2 + r * 3;
        // Window glass
        const win = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.2), wMat);
        win.position.set(wx, wy, d / 2 + 0.01);
        g.add(win);
        // Window frame
        const frame = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.3, 0.1), frameMat);
        frame.position.set(wx, wy, d / 2 + 0.05);

      }

  // Door
  const doorMat = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.9 });
  const door = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 0.1), doorMat);

  foundation.position.y = -h / 2 - 0.2;

}

// 瞭望塔
function createTower(w, h, d) {
  const g = new THREE.Group();
  const woodTex = createWoodTexture();
  const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, color: 0x6b5b3a, roughness: 0.9 });
  const metalMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7, metalness: 0.5 });

  // Support legs (4 angled poles)
  for (let i = 0; i < 4; i++) {
    const lx = (i % 2 === 0 ? -1 : 1) * 1.2;
    const lz = (i < 2 ? -1 : 1) * 1.2;
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, h, 6), woodMat);
    leg.position.set(lx, 0, lz);
    leg.rotation.z = lx * 0.05;
    leg.rotation.x = lz * 0.05;
    leg.castShadow = true;
    g.add(leg);
  }

  // Cross braces
  for (let i = 0; i < 3; i++) {
    const braceH = h * 0.25 + i * h * 0.25;
    const brace = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.08, 0.08), woodMat);
    brace.position.y = braceH;
    g.add(brace);
    const brace2 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 2.8), woodMat);
    brace2.position.y = braceH;
    g.add(brace2);
  }

  // Platform
  const platGeo = new THREE.BoxGeometry(3, 0.15, 3);
  const plat = new THREE.Mesh(platGeo, woodMat);
  plat.position.y = h * 0.85;
  plat.castShadow = true;
  g.add(plat);

  // Railing
  const railMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.9 });
  for (let i = 0; i < 4; i++) {
    const rx = (i % 2 === 0 ? -1 : 1) * 1.4;
    const rz = (i < 2 ? -1 : 1) * 1.4;
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1, 6), railMat);
    post.position.set(rx, h * 0.85 + 0.5, rz);
    g.add(post);
  }

  // Roof
  const roofGeo = new THREE.ConeGeometry(2, 1.5, 4);
  const roof = new THREE.Mesh(roofGeo, new THREE.MeshStandardMaterial({ color: 0x4a4a3a, roughness: 0.9 }));
  roof.position.y = h + 0.5;
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  g.add(roof);

  // Searchlight
  const light = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 0.4, 8), metalMat);
  light.position.set(0, h * 0.85 + 0.3, 1.2);
  light.rotation.x = 0.3;
  g.add(light);

  return g;
}

// ===================== PROCEDURAL TEXTURES =====================
function createMetalTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  // Base metal color
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(0, 0, 256, 256);
  // Scratches and wear marks
  for (let i = 0; i < 50; i++) {
    ctx.strokeStyle = `rgba(${60 + Math.random() * 30}, ${60 + Math.random() * 30}, ${60 + Math.random() * 30}, 0.3)`;
    ctx.lineWidth = Math.random() * 2;
    ctx.beginPath();
    ctx.moveTo(Math.random() * 256, Math.random() * 256);
    ctx.lineTo(Math.random() * 256, Math.random() * 256);
    ctx.stroke();
  }
  // Tool marks
  for (let i = 0; i < 20; i++) {
    ctx.fillStyle = `rgba(${50 + Math.random() * 20}, ${50 + Math.random() * 20}, ${50 + Math.random() * 20}, 0.2)`;
    ctx.fillRect(Math.random() * 240, Math.random() * 240, 5 + Math.random() * 15, 2 + Math.random() * 5);
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  return texture;
}

function createWoodTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  // Base wood color
  const gradient = ctx.createLinearGradient(0, 0, 256, 0);
  gradient.addColorStop(0, '#6b4226');
  gradient.addColorStop(0.3, '#7a5233');
  gradient.addColorStop(0.6, '#5d3a1f');
  gradient.addColorStop(1, '#6b4226');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 256, 256);
  // Wood grain lines
  for (let y = 0; y < 256; y += 3) {
    ctx.strokeStyle = `rgba(${80 + Math.random() * 40}, ${50 + Math.random() * 30}, ${20 + Math.random() * 20}, ${0.1 + Math.random() * 0.2})`;
    ctx.lineWidth = 1 + Math.random() * 2;
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin(y * 0.1) * 5);
    for (let x = 0; x < 256; x += 10) {
      ctx.lineTo(x, y + Math.sin((x + y) * 0.05) * 8);
    }
    ctx.stroke();
  }
  // Knots
  for (let i = 0; i < 3; i++) {
    const kx = Math.random() * 200 + 28;
    const ky = Math.random() * 200 + 28;
    ctx.fillStyle = `rgba(${50 + Math.random() * 20}, ${30 + Math.random() * 15}, ${10 + Math.random() * 10}, 0.4)`;
    ctx.beginPath();
    ctx.ellipse(kx, ky, 8 + Math.random() * 12, 5 + Math.random() * 8, Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  return texture;
}

function createFabricTexture(baseColor) {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, 128, 128);
  // Weave pattern
  for (let y = 0; y < 128; y += 2) {
    for (let x = 0; x < 128; x += 2) {
      if ((x + y) % 4 === 0) {
        ctx.fillStyle = `rgba(0,0,0,0.05)`;
        ctx.fillRect(x, y, 2, 2);
      }
    }
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  return texture;
}

function createConcreteTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#5a5a5a';
  ctx.fillRect(0, 0, 256, 256);
  // Noise and stains
  for (let i = 0; i < 200; i++) {
    const brightness = 80 + Math.random() * 40;
    ctx.fillStyle = `rgba(${brightness}, ${brightness}, ${brightness}, 0.1)`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 3 + Math.random() * 8, 3 + Math.random() * 8);
  }
  // Cracks
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = `rgba(40, 40, 40, 0.3)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    let x = Math.random() * 256, y = Math.random() * 256;
    ctx.moveTo(x, y);
    for (let j = 0; j < 5; j++) {
      x += (Math.random() - 0.5) * 40;
      y += (Math.random() - 0.5) * 40;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  return texture;
}

function createGroundTexture(type) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  let baseR, baseG, baseB;
  if (type === 'desert') { baseR = 194; baseG = 178; baseB = 128; }
  else if (type === 'jungle') { baseR = 61; baseG = 92; baseB = 61; }
  else { baseR = 90; baseG = 106; baseB = 90; }
  ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
  ctx.fillRect(0, 0, 512, 512);
  // Terrain variation
  for (let i = 0; i < 500; i++) {
    const variation = (Math.random() - 0.5) * 30;
    ctx.fillStyle = `rgba(${baseR + variation}, ${baseG + variation}, ${baseB + variation}, 0.3)`;
    const size = 5 + Math.random() * 20;
    ctx.fillRect(Math.random() * 512, Math.random() * 512, size, size);
  }
  // Grass patches for jungle
  if (type === 'jungle') {
    for (let i = 0; i < 100; i++) {
      ctx.fillStyle = `rgba(${40 + Math.random() * 30}, ${100 + Math.random() * 40}, ${30 + Math.random() * 20}, 0.4)`;
      ctx.beginPath();
      ctx.arc(Math.random() * 512, Math.random() * 512, 3 + Math.random() * 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // Rocks for mountain
  if (type === 'mountain') {
    for (let i = 0; i < 50; i++) {
      ctx.fillStyle = `rgba(${70 + Math.random() * 30}, ${70 + Math.random() * 30}, ${70 + Math.random() * 30}, 0.3)`;
      ctx.fillRect(Math.random() * 500, Math.random() * 500, 10 + Math.random() * 20, 8 + Math.random() * 15);
    }
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(4, 4);
  return texture;
}

// ===================== WEAPON BUMP MAP =====================
function createMetalBumpMap() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, 256, 256);
  // Fine machining lines (subtle)
  for (let i = 0; i < 40; i++) {
    const y = Math.random() * 256;
    ctx.strokeStyle = `rgb(${125 + Math.random() * 10}, ${125 + Math.random() * 10}, ${125 + Math.random() * 10})`;
    ctx.lineWidth = 0.3 + Math.random() * 0.8;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(256, y + (Math.random() - 0.5) * 20);
    ctx.stroke();
  }
  // Random dots for texture variation
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = `rgb(${125 + Math.random() * 10}, ${125 + Math.random() * 10}, ${125 + Math.random() * 10})`;
    ctx.beginPath();
    ctx.arc(Math.random() * 256, Math.random() * 256, 0.5 + Math.random() * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  // Edge highlights
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.05 + Math.random() * 0.1})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 2 + Math.random() * 8, 1);
  }
  // Wear spots (darker)
  for (let i = 0; i < 15; i++) {
    ctx.fillStyle = `rgba(0,0,0,${0.05 + Math.random() * 0.1})`;
    ctx.beginPath();
    ctx.arc(Math.random() * 256, Math.random() * 256, 3 + Math.random() * 10, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function createWeaponModels() {

  });

  });

  });

  });

    color: 0x2244aa, metalness: 0.1, roughness: 0.0,
    transparent: true, opacity: 0.5, envMapIntensity: 3.0
  });

  // Helper: add part to group
  function addPart(group, geo, mat, x, y, z, rx, ry, rz) {
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    if (rx) mesh.rotation.x = rx;
    if (ry) mesh.rotation.y = ry;

  }

  // ========== 1. M9 手枪 (Beretta M9) ==========
  const m9 = new THREE.Group();

  addPart(m9, new THREE.BoxGeometry(0.042, 0.038, 0.24), metalMat, 0, 0.022, -0.08);
  // 套筒顶部圆角
  addPart(m9, new THREE.CylinderGeometry(0.021, 0.021, 0.24, 8, 1, false, 0, Math.PI), metalMat, 0, 0.041, -0.08, Math.PI / 2);

  // 套筒防滑纹 左
  for (let i = 0; i < 6; i++) addPart(m9, new THREE.BoxGeometry(0.003, 0.039, 0.01), blackMat, -0.021, 0.022, 0.0 - i * 0.014);
  // 枪管外筒
  addPart(m9, new THREE.CylinderGeometry(0.012, 0.012, 0.08, 10), metalMat, 0, 0.025, -0.22, Math.PI / 2);
  // 枪管
  addPart(m9, new THREE.CylinderGeometry(0.01, 0.01, 0.06, 10), metalMat, 0, 0.025, -0.23, Math.PI / 2);
  // 枪口帽

function updateWeaponAttachmentVisuals() {
  for (let i = 0; i < weaponGroups.length; i++) {
    const gun = weaponGroups[i];
    if (!gun) continue;
    // Remove old attachment meshes
    const toRemove = gun.children.filter(c => c.userData.isAttachment);
    toRemove.forEach(c => gun.remove(c));
    const mods = weaponMods[i];
    if (!mods) continue;
    // Scope — small box on top
    if (mods.scope) {
      const scopeGeo = new THREE.BoxGeometry(0.04, 0.04, 0.15);
      const scopeMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.2 });
      const scope = new THREE.Mesh(scopeGeo, scopeMat);
      scope.position.set(0, 0.06, -0.05);
      scope.userData.isAttachment = true;
      gun.add(scope);
    }
    // Suppressor — cylinder at muzzle
    if (mods.suppressor) {
      const suppGeo = new THREE.CylinderGeometry(0.025, 0.022, 0.12, 8);
      const suppMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.85, roughness: 0.25 });
      const supp = new THREE.Mesh(suppGeo, suppMat);
      supp.rotation.x = Math.PI / 2;
      supp.position.set(0, 0.01, -0.35);
      supp.userData.isAttachment = true;
      gun.add(supp);
    }
    // Grip — small box under handguard
    if (mods.grip) {
      const gripGeo = new THREE.BoxGeometry(0.03, 0.06, 0.03);
      const gripMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
      const grip = new THREE.Mesh(gripGeo, gripMat);
      grip.position.set(0, -0.04, -0.1);
      grip.userData.isAttachment = true;
      gun.add(grip);
    }
    // Laser — small red dot on side
    if (mods.laser) {
      const laserGeo = new THREE.SphereGeometry(0.008, 6, 6);
      const laserMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 2 });
      const laser = new THREE.Mesh(laserGeo, laserMat);
      laser.position.set(0.03, 0.02, -0.15);
      laser.userData.isAttachment = true;
      gun.add(laser);
    }
    // Stock — box at rear
    if (mods.stock) {
      const stockGeo = new THREE.BoxGeometry(0.035, 0.05, 0.08);
      const stockMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.85 });
      const stock = new THREE.Mesh(stockGeo, stockMat);
      stock.position.set(0, 0, 0.15);
      stock.userData.isAttachment = true;
      gun.add(stock);
    }
  }
}

function createBox(w, h, d, mat, x, y, z, rotX) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x || 0, y || 0, z || 0);
  if (rotX) mesh.rotation.x = rotX;
  return mesh;
}

function createCylinder(rt, rb, h, seg, mat, x, y, z, rotX) {
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  mesh.position.set(x || 0, y || 0, z || 0);
  if (rotX) mesh.rotation.x = Math.PI / 2;
  return mesh;
}

    label.textContent = 'ACOG 2X';

}

  g.add(torso);

  // Head

  rLeg.position.set(0.12, 0.05, 0); g.add(rLeg);

  // Type-specific

  } else if (type === 'shield') {

      new THREE.BoxGeometry(0.55, 0.85, 0.035),
      new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.5, roughness: 0.5 })
    );
    shield.position.set(-0.35, 0.7, 0.12); g.add(shield);
    // SMG in right hand
    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.22), gunMat);
    gun.position.set(0.3, 0.5, 0.12); g.add(gun);
  } else if (type === 'heavy') {
    // Heavy armor plates
    const plate = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.15, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.6, roughness: 0.4 })
    );
    plate.position.set(0, 0.85, 0); g.add(plate);
    // LMG
    const lmg = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.4), gunMat);
    lmg.position.set(0.3, 0.5, 0.15); g.add(lmg);
    // Ammo pack

    );

  } else if (type === 'boss') {

    const bowBody = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.25), gunMat);

    lastAttack: 0,
    state: 'chase',
    walkPhase: 0,
    hpBar, hpBg,
    // Boss-specific
    rollCooldown: 0, lastRoll: 0,
    crossbowCooldown: 0, lastCrossbow: 0,
    knifeCooldown: 0, lastKnife: 0,
    fireZones: []
  };

  return g;
}

// ===================== PARTICLES =====================
function spawnParticles(pos, color, count, speed, life, size, type) {
  for (let i = 0; i < count; i++) {
    let geo, mat;

    if (type === 'spark') {
      // Sparks - small bright particles
      geo = new THREE.SphereGeometry(size || 0.02, 4, 4);
      mat = new THREE.MeshBasicMaterial({ color: color || 0xffaa44, transparent: true });
    } else if (type === 'smoke') {
      // Smoke - larger, darker, slower
      geo = new THREE.SphereGeometry(size || 0.1, 6, 6);
      mat = new THREE.MeshBasicMaterial({ color: color || 0x444444, transparent: true });
    } else if (type === 'debris') {
      // Debris - irregular shapes
      geo = new THREE.BoxGeometry(size || 0.05, size || 0.05, size || 0.05);
      mat = new THREE.MeshStandardMaterial({ color: color || 0x8B6914, roughness: 0.9 });
    } else {
      // Default particles
      geo = new THREE.SphereGeometry(size || 0.03, 4, 4);
      mat = new THREE.MeshBasicMaterial({ color: color || 0xff4444, transparent: true });
    }

    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData = {
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * speed,
        Math.random() * speed * 0.8,
        (Math.random() - 0.5) * speed
      ),
      life: life || 0.5,
      age: 0,
      type: type || 'default'
    };

    // Add gravity for debris
    if (type === 'debris') {
      p.userData.gravity = -9.8;
      p.userData.angularVel = new THREE.Vector3(
        Math.random() * 10,
        Math.random() * 10,
        Math.random() * 10
      );
    }

    scene.add(p);
    particles.push(p);
  }
}

function spawnMuzzleFlash(pos, dir) {
  // Position flash at weapon's muzzle (weapon group position + muzzle offset)
  const gun = weaponGroups[player.currentWeapon];

  });

}

// Brass casing ejection
const brassCasings = [];
function spawnBrassCasing() {
  const brassMat = new THREE.MeshStandardMaterial({ color: 0xccaa44, metalness: 0.9, roughness: 0.3 });
  const brassGeo = new THREE.CylinderGeometry(0.004, 0.005, 0.02, 6);
  const brass = new THREE.Mesh(brassGeo, brassMat);

  // Eject from weapon's ejection port
  const gun = weaponGroups[player.currentWeapon];
  const ejectOffsets = [
    [0.022, 0.035, -0.06],  // M9
    [0.027, 0.022, -0.02],  // MP5
    [0.027, 0.03, -0.03],   // M16
    [0.035, 0.052, -0.06],  // M60
    [0.027, 0.03, 0.02],    // Remington
    [0, 0.032, -0.03]       // M40
  ];
  const eo = ejectOffsets[player.currentWeapon] || [0.025, 0.03, -0.03];
  brass.position.set(
    gun.position.x + eo[0],
    gun.position.y + eo[1],
    gun.position.z + eo[2]
  );
  brass.velocity = new THREE.Vector3(
    0.3 + Math.random() * 0.2,
    0.5 + Math.random() * 0.3,
    -0.5 + Math.random() * 0.2
  );
  brass.angularVelocity = new THREE.Vector3(
    Math.random() * 10,
    Math.random() * 10,
    Math.random() * 10
  );
  brass.life = 1.0;

  camera.add(brass);
  brassCasings.push(brass);
}

function updateBrassCasings(dt) {
  for (let i = brassCasings.length - 1; i >= 0; i--) {
    const brass = brassCasings[i];
    brass.life -= dt;

    if (brass.life <= 0) {
      camera.remove(brass);
      brassCasings.splice(i, 1);
      continue;
    }

    // Apply gravity and movement
    brass.velocity.y -= 9.8 * dt;
    brass.position.x += brass.velocity.x * dt;
    brass.position.y += brass.velocity.y * dt;
    brass.position.z += brass.velocity.z * dt;

    // Apply rotation
    brass.rotation.x += brass.angularVelocity.x * dt;
    brass.rotation.y += brass.angularVelocity.y * dt;
    brass.rotation.z += brass.angularVelocity.z * dt;

    // Fade out
    brass.material.opacity = brass.life;
    brass.material.transparent = true;
  }
}

// ===================== PLAYER CONTROLS =====================
function onMouseMove(e) {
  if (gameState !== ST.PLAYING) return;
  const sens = isADS ? ADS_SENSITIVITY : NORMAL_SENSITIVITY;
  player.yaw -= e.movementX * sens;
  player.pitch -= e.movementY * sens;
  player.pitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, player.pitch));
}

function onKeyDown(e) {
  if (gameState === ST.PLAYING) {
    if (e.code === 'Digit1') switchWeapon(0);
    if (e.code === 'Digit2') switchWeapon(1);
    if (e.code === 'Digit3') switchWeapon(2);
    if (e.code === 'Digit4') switchWeapon(3);
    if (e.code === 'Digit5') switchWeapon(4);
    if (e.code === 'Digit6') switchWeapon(5);
    if (e.code === 'KeyR') reloadWeapon();
    if (e.code === 'KeyE') interact();
    if (e.code === 'KeyF') tryExtract();
    if (e.code === 'KeyI') openInventory();
    if (e.code === 'Escape') {
      if (containerUIOpen) closeContainerUI();
      else if (gameState === ST.INVENTORY) closeInventory();
      else if (gameState === ST.GUNSMITH) closeGunsmith();
    }
    // 战术姿态 - 移除跳跃，改为蹲/站切换
    if (e.code === 'Space') {
      // 切换站立/蹲伏
      if (player.stance === STANCE.STAND) player.stance = STANCE.CROUCH;
      else if (player.stance === STANCE.CROUCH) player.stance = STANCE.STAND;
    }
  }
}

function switchWeapon(idx) {
  if (idx === player.currentWeapon || player.weapons[player.currentWeapon].reloading) return;
  player.currentWeapon = idx;
  // Hide all, show current
  weaponGroups.forEach((g, i) => g.visible = i === idx);
  // Reset scope state
  currentScopeReticle = null;
  document.getElementById('scope-overlay').style.display = 'none';
  playSound('reload_bolt');
}

function reloadWeapon() {
  const w = player.weapons[player.currentWeapon];
  if (w.reloading || w.ammo === w.magSize || (w.reserve <= 0 && !w.infinite)) return;
  const mods = weaponMods[player.currentWeapon];
  const magSlot = mods.magazine ? ATTACHMENTS.magazine.find(a => a.name === mods.magazine) : null;
  const reloadMul = (magSlot && magSlot.reloadMul) ? magSlot.reloadMul : 1.0;
  const reloadTime = w.reloadTime * reloadMul;
  w.reloading = true;
  document.getElementById('reload-indicator').style.display = 'block';
  playSound('reload_magout');
  setTimeout(() => playSound('reload_magin'), reloadTime * 0.5);
  setTimeout(() => playSound('reload_bolt'), reloadTime * 0.85);
  setTimeout(() => {
    const need = w.magSize - w.ammo;
    if (w.infinite) { w.ammo = w.magSize; }
    else { const add = Math.min(need, w.reserve); w.ammo += add; w.reserve -= add; }
    w.reloading = false;
    document.getElementById('reload-indicator').style.display = 'none';
  }, reloadTime);
}

let searching = false;
let searchProgress = 0;
let searchTimer = null;

function interact() {
  if (searching) return;
  // Pick up items
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    if (player.pos.distanceTo(p.position) < 2.5) {
      const t = p.userData.type;
      if (t === 'health') { player.hp = Math.min(player.maxHp, player.hp + 30); }
      else if (t === 'ammo') {
        player.weapons.forEach(w => { if (!w.infinite) w.reserve += w.magSize; });
      } else if (t === 'loot') { player.loot++; }
      else if (t === 'attachment') { addToBackpack({ name: '武器配件', icon: '🔧', qty: 1 }); }
      playSound('pickup');
      scene.remove(p); pickups.splice(i, 1);
      return;
    }
  }
  // Search containers with progress bar
  for (const c of containers) {
    if (!c.searched && player.pos.distanceTo(new THREE.Vector3(c.x, 0, c.z)) < 2.5) {
      c.searched = true;
      const searchTime = c.type === 'safe' ? 3000 : 2000;
      searching = true;
      searchProgress = 0;
      const barContainer = document.getElementById('search-progress-container');
      const barFill = document.getElementById('search-progress-fill');
      const barText = document.getElementById('search-progress-text');
      const typeNames = { normal: '战术箱', ammo_crate: '弹药箱', gear_crate: '装备箱', safe: '保险箱' };
      barText.textContent = '搜索 ' + (typeNames[c.type] || '容器') + '...';
      barContainer.style.display = 'block';
      barFill.style.width = '0%';
      const startTime = Date.now();
      searchTimer = setInterval(() => {
        const elapsed = Date.now() - startTime;
        searchProgress = Math.min(1, elapsed / searchTime);
        barFill.style.width = (searchProgress * 100) + '%';
        if (searchProgress >= 1) {
          clearInterval(searchTimer);
          searchTimer = null;
          searching = false;
          barContainer.style.display = 'none';
          c.items = generateContainerLoot(c.loot, c.type);
          openContainerUI(c.items);
          playSound('pickup');
        }
      }, 50);
      return;
    }
  }
}

let extractInterval = null;
let extractCountdown = 0;
const EXTRACT_TIME = 10;

function findNearestExtractZone() {
  let nearest = null, minDist = Infinity;
  for (const z of extractZones) {
    const ud = z.userData;
    const d = Math.sqrt((player.pos.x - ud.x) ** 2 + (player.pos.z - ud.z) ** 2);
    if (d < minDist) { minDist = d; nearest = z; }
  }
  return { zone: nearest, dist: minDist };
}

function tryExtract() {
  if (!extractActive) return;
  if (extractInterval) return;
  const { zone, dist } = findNearestExtractZone();
  if (!zone || dist > 4) return;

  const ed = zone.userData;
  const hint = document.getElementById('extract-hint');
  const text = document.getElementById('extract-text');
  const bar = document.getElementById('extract-bar');
  hint.style.display = 'block';
  extractCountdown = EXTRACT_TIME;
  text.textContent = '撤离中... ' + extractCountdown + '秒';
  bar.style.width = '0%';

  extractInterval = setInterval(() => {
    const d = Math.sqrt((player.pos.x - ed.x) ** 2 + (player.pos.z - ed.z) ** 2);
    if (d > 5) {
      clearInterval(extractInterval);
      extractInterval = null;
      hint.style.display = 'none';
      text.textContent = '';
      bar.style.width = '0%';
      return;
    }
    extractCountdown--;
    const progress = ((EXTRACT_TIME - extractCountdown) / EXTRACT_TIME) * 100;
    bar.style.width = progress + '%';
    if (extractCountdown <= 0) {
      clearInterval(extractInterval);
      extractInterval = null;
      hint.style.display = 'none';
      doExtract();
    } else {
      text.textContent = '撤离中... ' + extractCountdown + '秒';
    }
  }, 1000);
}

function doExtract() {
  playSound('extract');
  extractionCount++;
  totalKills += player.kills;
  totalLoot += player.loot;
  localStorage.setItem('dz_extractions', extractionCount);
  localStorage.setItem('dz_kills', totalKills);
  localStorage.setItem('dz_loot', totalLoot);
  endGame(true);
}

// ===================== SHOOTING =====================
let recoilX = 0, recoilY = 0, recoilZ = 0;

function shoot() {
  const w = player.weapons[player.currentWeapon];
  if (searching || w.reloading || Date.now() - w.lastFire < w.fireRate || w.ammo <= 0) return;
  console.log('[Shoot] weapon=' + w.name + ' ammo=' + w.ammo);
  w.lastFire = Date.now();
  w.ammo--;

  const mods = weaponMods[player.currentWeapon];
  const gun = weaponGroups[player.currentWeapon];
  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  const muzzlePos = camera.position.clone().add(fwd.clone().multiplyScalar(0.5));
  spawnMuzzleFlash(muzzlePos, fwd);

  // Apply recoil (affected by grip, suppressor, stock)
  let recoilMul = 1.0;
  if (mods.grip) { const g = ATTACHMENTS.grip.find(a => a.name === mods.grip); if (g && g.recoilMul) recoilMul *= g.recoilMul; }
  if (mods.suppressor) { const s = ATTACHMENTS.suppressor.find(a => a.name === mods.suppressor); if (s && s.recoilMul) recoilMul *= s.recoilMul; }
  if (mods.stock) { const st = ATTACHMENTS.stock.find(a => a.name === mods.stock); if (st && st.recoilMul) recoilMul *= st.recoilMul; }
  const recoilAmount = (w.recoil || 0.02) * recoilMul;
  recoilZ = recoilAmount * 2;
  recoilY = recoilAmount * (0.5 + Math.random() * 0.5);
  recoilX = (Math.random() - 0.5) * recoilAmount;

  // Camera shake
  const shakeAmount = recoilAmount * 0.3;
  player.yaw += (Math.random() - 0.5) * shakeAmount;
  player.pitch += recoilAmount * 0.2;

  // Spread (affected by scope, laser)
  let spreadMul = 1.0;
  if (mods.scope) { const s = ATTACHMENTS.scope.find(a => a.name === mods.scope); if (s && s.spreadMul) spreadMul *= s.spreadMul; }
  const hipSpreadMul = mods.laser ? (ATTACHMENTS.laser[0]?.hipSpreadMul || 0.7) : 1.0;

  for (let p = 0; p < w.pellets; p++) {
    const baseSpread = isADS ? w.spread * 0.5 * spreadMul : w.spread * hipSpreadMul;
    const dir = fwd.clone();
    dir.x += (Math.random() - 0.5) * baseSpread;
    dir.y += (Math.random() - 0.5) * baseSpread;
    dir.z += (Math.random() - 0.5) * baseSpread;
    dir.normalize();

    // Create player bullet visual
    createPlayerBullet(camera.position.clone().add(fwd.clone().multiplyScalar(0.6)), dir);

    const raycaster = new THREE.Raycaster(camera.position.clone(), dir, 0, w.range);

    // Check enemies
    let hitEnemy = null, hitDist = Infinity;
    for (const e of enemies) {
      const boxes = [];
      e.traverse(c => { if (c.isMesh) boxes.push(c); });
      const hits = raycaster.intersectObjects(boxes, false);
      if (hits.length > 0 && hits[0].distance < hitDist) {
        hitDist = hits[0].distance;
        hitEnemy = e;
      }
    }
    if (hitEnemy) {
      const dmg = w.damage + (mods.grip ? 2 : 0);
      hitEnemy.userData.hp -= dmg;
      playSound('enemy_hit');
      spawnParticles(hitEnemy.position.clone().setY(0.8), 0xff0000, 5, 3, 0.3);
      if (hitEnemy.userData.hp <= 0) {
        killEnemy(hitEnemy);
      }
    }
  }

  // Auto reload (affected by magazine reload speed)
  if (w.ammo <= 0 && (w.reserve > 0 || w.infinite)) reloadWeapon();
}

function killEnemy(e) {
  // Weighted drops: ammo 60%, loot 30%, health 20%, attachment 10%
  const roll = Math.random();
  let drop;
  if (roll < 0.6) drop = 'ammo';
  else if (roll < 0.9) drop = 'loot';
  else if (roll < 0.95) drop = 'health';
  else drop = 'attachment';
  const pk = createPickup(drop);
  pk.position.copy(e.position); pk.position.y = 0.5;
  scene.add(pk); pickups.push(pk);

  spawnParticles(e.position.clone().setY(0.5), 0xff4444, 15, 5, 0.5, 0.05);
  scene.remove(e);
  enemies.splice(enemies.indexOf(e), 1);
  enemiesKilled++;
  player.kills++;
  player.score += e.userData.type === 'boss' ? 500 : e.userData.type === 'heavy' ? 100 : 50;

  // Check if extract should activate
  if (!extractActive && enemiesKilled >= Math.floor(enemies.length * 0.5)) {
    extractActive = true;
    extractZones.forEach(z => z.userData.active = true);
    const announce = document.getElementById('wave-announce');
    announce.style.display = 'block';
    announce.querySelector('.big').textContent = '撤离点已激活';
    announce.querySelector('.sub').textContent = '前往绿色烟雾区域按 F 集合撤离';
    setTimeout(() => { announce.style.display = 'none'; }, 3000);
  }
}

// ===================== ENEMY AI =====================
function updateEnemies(dt) {
  const diff = 1 + extractionCount * 0.1;
  for (const e of enemies) {
    const d = e.userData;
    const toPlayer = new THREE.Vector3().subVectors(player.pos, e.position);
    toPlayer.y = 0;
    const dist = toPlayer.length();

    e.rotation.y = Math.atan2(toPlayer.x, toPlayer.z);
    d.hpBar.lookAt(camera.position);
    d.hpBg.lookAt(camera.position);
    d.hpBar.scale.x = Math.max(0, d.hp / d.maxHp);

    d.walkPhase += dt * d.speed * 4;
    const wp = d.walkPhase;
    // Animate limbs
    let lLeg, rLeg, lArm, rArm;
    e.traverse(c => {
      if (c.name === 'leftLeg') lLeg = c;
      if (c.name === 'rightLeg') rLeg = c;
      if (c.name === 'leftArm') lArm = c;
      if (c.name === 'rightArm') rArm = c;
    });
    if (dist > 3) {
      if (lLeg) lLeg.rotation.x = Math.sin(wp) * 0.4;
      if (rLeg) rLeg.rotation.x = -Math.sin(wp) * 0.4;
    }
    if (lArm) lArm.rotation.x = -Math.sin(wp) * 0.2;
    if (rArm) rArm.rotation.x = Math.sin(wp) * 0.2;

    // ---- BOSS AI ----
    if (d.type === 'boss') {
      updateBossAI(e, d, dist, toPlayer, dt, diff);
      continue;
    }

    // ---- GENERAL AI ----
    const now = Date.now();
    if (dist < d.meleeRange) {
      // Melee attack
      d.state = 'melee';
      if (now - d.lastAttack > d.attackCooldown * 0.6) {
        d.lastAttack = now;
        const dmg = d.type === 'shield' ? d.damage * 1.5 : d.type === 'heavy' ? d.damage * 1.2 : d.damage;
        damagePlayer(dmg * diff);
        playSound('knife');
      }
      // Back off slightly
      if (dist < 1.5) {
        e.position.x -= toPlayer.normalize().x * d.speed * dt * 0.5;
        e.position.z -= toPlayer.normalize().z * d.speed * dt * 0.5;
      }
    } else if (dist < d.attackRange) {
      // Ranged attack
      d.state = 'attack';
      if (now - d.lastAttack > d.attackCooldown) {
        d.lastAttack = now;
        enemyShoot(e, d, diff);
      }
      // Slowly approach
      const dir = toPlayer.normalize();
      e.position.x += dir.x * d.speed * 0.3 * dt;
      e.position.z += dir.z * d.speed * 0.3 * dt;
    } else {
      // Chase
      d.state = 'chase';
      const dir = toPlayer.normalize();
      e.position.x += dir.x * d.speed * dt;
      e.position.z += dir.z * d.speed * dt;
    }

    // Building collision for enemies
    for (const b of buildings) {
      if (e.position.x > b.x - b.w - 0.5 && e.position.x < b.x + b.w + 0.5 &&
        e.position.z > b.z - b.d - 0.5 && e.position.z < b.z + b.d + 0.5) {
        const dx = e.position.x - b.x, dz = e.position.z - b.z;
        if (Math.abs(dx / b.w) > Math.abs(dz / b.d)) {
          e.position.x = dx > 0 ? b.x + b.w + 0.5 : b.x - b.w - 0.5;
        } else {
          e.position.z = dz > 0 ? b.z + b.d + 0.5 : b.z - b.d - 0.5;
        }
      }
    }

    // Cover walls collision for enemies
    for (const c of covers) {
      const hw = c.w + 0.5, hd = c.d + 0.5;
      if (e.position.x > c.x - hw && e.position.x < c.x + hw &&
        e.position.z > c.z - hd && e.position.z < c.z + hd) {
        const dx = e.position.x - c.x, dz = e.position.z - c.z;
        if (Math.abs(dx / c.w) > Math.abs(dz / c.d)) {
          e.position.x = dx > 0 ? c.x + hw : c.x - hw;
        } else {
          e.position.z = dz > 0 ? c.z + hd : c.z - hd;
        }
      }
    }

    // Props collision for enemies (circular)
    for (const p of props) {
      const dx = e.position.x - p.x, dz = e.position.z - p.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      const minDist = p.size + 0.5;
      if (dist < minDist && dist > 0) {
        const ratio = minDist / dist;
        e.position.x = p.x + dx * ratio;
        e.position.z = p.z + dz * ratio;
      }
    }

    // 适应地形高度
    const terrainY = getTerrainHeight(e.position.x, e.position.z);
    e.position.y += (terrainY - e.position.y) * Math.min(1, dt * 8);
  }
}

function updateBossAI(e, d, dist, toPlayer, dt, diff) {
  const now = Date.now();
  const dir = toPlayer.normalize();

  // Roll dodge (every 3-5 seconds when in combat)
  if (dist < 30 && now - d.lastRoll > (4000 - extractionCount * 200)) {
    d.lastRoll = now;
    // Roll sideways
    const side = new THREE.Vector3(-dir.z, 0, dir.x);
    if (Math.random() > 0.5) side.negate();
    const rollTarget = e.position.clone().add(side.multiplyScalar(5));
    e.position.lerp(rollTarget, 0.8);
    spawnParticles(e.position.clone().setY(0.3), 0xffaa00, 8, 3, 0.3);
  }

  // Crossbow with fire (medium-long range)
  if (dist > 5 && dist < 35 && now - d.lastCrossbow > (3000 - extractionCount * 150)) {
    d.lastCrossbow = now;
    playSound('crossbow');
    // Create fire bolt projectile
    const boltGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6);
    const boltMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });
    const bolt = new THREE.Mesh(boltGeo, boltMat);
    bolt.position.copy(e.position).setY(1.2);
    bolt.lookAt(player.pos);
    bolt.rotation.x = Math.PI / 2;
    bolt.userData = {
      vel: dir.clone().multiplyScalar(15),
      life: 2, age: 0, isFire: true
    };
    scene.add(bolt);
    bullets.push(bolt);
  }

  // Knife combo (close range)
  if (dist < 3 && now - d.lastKnife > (1500 - extractionCount * 100)) {
    d.lastKnife = now;
    damagePlayer(d.damage * 1.5 * diff);
    playSound('knife');
    spawnParticles(player.pos.clone().setY(1), 0xff0000, 10, 4, 0.3);
  }

  // Melee slam (close-medium range)
  if (dist < 5 && dist >= 3 && now - d.lastAttack > d.attackCooldown) {
    d.lastAttack = now;
    damagePlayer(d.damage * diff);
    playSound('hit');
  }

  // Movement
  if (dist > 4) {
    e.position.x += dir.x * d.speed * dt;
    e.position.z += dir.z * d.speed * dt;
  } else if (dist < 2) {
    e.position.x -= dir.x * d.speed * 0.5 * dt;
    e.position.z -= dir.z * d.speed * 0.5 * dt;
  }

  // Building collision
  for (const b of buildings) {
    if (e.position.x > b.x - b.w - 0.5 && e.position.x < b.x + b.w + 0.5 &&
      e.position.z > b.z - b.d - 0.5 && e.position.z < b.z + b.d + 0.5) {
      const dx = e.position.x - b.x, dz = e.position.z - b.z;
      if (Math.abs(dx / b.w) > Math.abs(dz / b.d)) {
        e.position.x = dx > 0 ? b.x + b.w + 0.5 : b.x - b.w - 0.5;
      } else {
        e.position.z = dz > 0 ? b.z + b.d + 0.5 : b.z - b.d - 0.5;
      }
    }
  }

  // Cover walls collision for boss
  for (const c of covers) {
    const hw = c.w + 0.5, hd = c.d + 0.5;
    if (e.position.x > c.x - hw && e.position.x < c.x + hw &&
      e.position.z > c.z - hd && e.position.z < c.z + hd) {
      const dx = e.position.x - c.x, dz = e.position.z - c.z;
      if (Math.abs(dx / c.w) > Math.abs(dz / c.d)) {
        e.position.x = dx > 0 ? c.x + hw : c.x - hw;
      } else {
        e.position.z = dz > 0 ? c.z + hd : c.z - hd;
      }
    }
  }

  // Props collision for boss
  for (const p of props) {
    const dx = e.position.x - p.x, dz = e.position.z - p.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minDist = p.size + 0.5;
    if (dist < minDist && dist > 0) {
      const ratio = minDist / dist;
      e.position.x = p.x + dx * ratio;
      e.position.z = p.z + dz * ratio;
    }
  }

  // 适应地形高度
  const terrainY = getTerrainHeight(e.position.x, e.position.z);
  e.position.y += (terrainY - e.position.y) * Math.min(1, dt * 8);
}

function enemyShoot(enemy, d, diff) {
  const toPlayer = new THREE.Vector3().subVectors(player.pos, enemy.position).normalize();
  const spread = 0.1 * diff;
  toPlayer.x += (Math.random() - 0.5) * spread;
  toPlayer.y += (Math.random() - 0.5) * spread * 0.5;
  toPlayer.z += (Math.random() - 0.5) * spread;
  toPlayer.normalize();

  // Enemy bullet - bright and visible
  const bulletGroup = new THREE.Group();
  const bBody = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 0.15, 8),
    new THREE.MeshBasicMaterial({ color: 0xff4400 })
  );
  bBody.rotation.x = Math.PI / 2;
  bulletGroup.add(bBody);
  const bGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.5 })
  );
  bulletGroup.add(bGlow);

  bulletGroup.position.copy(enemy.position).setY(1.2);
  bulletGroup.userData = { vel: toPlayer.multiplyScalar(25), life: 2, age: 0 };
  scene.add(bulletGroup);
  bullets.push(bulletGroup);
}

// Player bullet visuals
function createPlayerBullet(pos, dir) {
  const bulletGroup = new THREE.Group();
  const bBody = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 0.12, 8),
    new THREE.MeshBasicMaterial({ color: 0xffff00 })
  );
  bBody.rotation.x = Math.PI / 2;
  bulletGroup.add(bBody);
  const bGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
  );
  bulletGroup.add(bGlow);

  bulletGroup.position.copy(pos);
  bulletGroup.userData = { vel: dir.clone().multiplyScalar(50), life: 1.5, age: 0, isPlayer: true };
  scene.add(bulletGroup);
  bullets.push(bulletGroup);
}

function damagePlayer(dmg) {
  // Cancel search on damage
  if (searching) {
    searching = false;
    if (searchTimer) { clearInterval(searchTimer); searchTimer = null; }
    document.getElementById('search-progress-container').style.display = 'none';
  }
  player.hp -= dmg;
  const overlay = document.getElementById('damage-overlay');
  overlay.style.background = 'radial-gradient(ellipse at center, transparent 30%, rgba(255,0,0,0.5) 100%)';
  setTimeout(() => { overlay.style.background = 'radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0) 100%)'; }, 150);
  playSound('hit');
  if (player.hp <= 0) {
    player.hp = 0;
    endGame(false);
  }
}

// ===================== ENEMY SPAWNING =====================
function spawnEnemies() {
  enemies.forEach(e => scene.remove(e));
  enemies = [];
  const m = currentMap;
  const diff = 1 + extractionCount * 0.08;
  const base = Math.floor(8 * m.enemyMult);
  const total = Math.floor(base * diff);

  const counts = {
    grunt: Math.floor(total * m.gruntRatio),
    shield: Math.floor(total * m.shieldRatio),
    heavy: Math.floor(total * m.heavyRatio)
  };

  for (const [type, count] of Object.entries(counts)) {
    for (let i = 0; i < count; i++) {
      const e = createEnemy(type);
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 50;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;
      const y = getTerrainHeight(x, z);
      e.position.set(x, y, z);
      scene.add(e); enemies.push(e);
    }
  }

  // Boss
  if (Math.random() < m.bossChance + extractionCount * 0.03) {
    const boss = createEnemy('boss');
    const bx = (Math.random() - 0.5) * 60;
    const bz = (Math.random() - 0.5) * 60;
    boss.position.set(bx, getTerrainHeight(bx, bz), bz);
    scene.add(boss); enemies.push(boss);
    bossSpawned = true;
    const announce = document.getElementById('wave-announce');
    announce.style.display = 'block';
    announce.querySelector('.big').textContent = '⚠ BOSS 出现!';
    announce.querySelector('.sub').textContent = '小心!';
    setTimeout(() => { announce.style.display = 'none'; }, 3000);
  }
}

// ===================== EXTRACTION SMOKE UPDATE =====================
function updateSmoke(dt) {
  for (const zone of extractZones) {
    const ed = zone.userData;
    if (!ed.smoke) continue;
    const positions = ed.smoke.geometry.attributes.position.array;
    const vels = ed.smokeVel;
    for (let i = 0; i < vels.length; i++) {
      positions[i * 3] += vels[i].vx * dt;
      positions[i * 3 + 1] += vels[i].vy * dt;
      positions[i * 3 + 2] += vels[i].vz * dt;
      if (positions[i * 3 + 1] > 5) {
        positions[i * 3] = ed.x + (Math.random() - 0.5) * 1.5;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = ed.z + (Math.random() - 0.5) * 1.5;
      }
    }
    ed.smoke.geometry.attributes.position.needsUpdate = true;
    ed.smoke.material.opacity = 0.3 + Math.sin(performance.now() / 500) * 0.2;
  }
}

// ===================== BULLETS UPDATE =====================
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.position.add(b.userData.vel.clone().multiplyScalar(dt));
    b.userData.age += dt;

    // Orient bullet to face direction of travel
    if (b.userData.vel.length() > 0) {
      b.lookAt(b.position.clone().add(b.userData.vel));
    }

    // Fire bolt creates fire zone on hit ground
    if (b.userData.isFire && b.position.y <= 0.1) {
      createFireZone(b.position.clone());
      scene.remove(b); bullets.splice(i, 1);
      continue;
    }
    if (b.userData.age > b.userData.life) {
      scene.remove(b); bullets.splice(i, 1);
      continue;
    }
    // Check player hit (only if not player bullet)
    if (!b.userData.isPlayer && b.position.distanceTo(player.pos) < 1.2) {
      damagePlayer(b.userData.isFire ? 15 : 10 + extractionCount);
      scene.remove(b); bullets.splice(i, 1);
      continue;
    }
    // Fire zone damage
    if (b.userData.isFire) {
      // Trail particles
      if (Math.random() < 0.3) {
        spawnParticles(b.position.clone(), 0xff4400, 1, 1, 0.3, 0.05);
      }
    }
  }
}

function createFireZone(pos) {
  const fireMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.5 });
  const fireMesh = new THREE.Mesh(new THREE.CircleGeometry(2, 16), fireMat);
  fireMesh.rotation.x = -Math.PI / 2;
  fireMesh.position.copy(pos); fireMesh.position.y = 0.05;
  scene.add(fireMesh);
  // Fire particles
  const fireInterval = setInterval(() => {
    spawnParticles(fireMesh.position.clone().setY(0.2), 0xff6600, 2, 2, 0.5, 0.08);
    // Damage player if in zone
    const dx = player.pos.x - fireMesh.position.x;
    const dz = player.pos.z - fireMesh.position.z;
    if (Math.sqrt(dx * dx + dz * dz) < 2) {
      damagePlayer(5 * (1 + extractionCount * 0.1));
    }
  }, 500);
  // Remove after 4 seconds
  setTimeout(() => {
    clearInterval(fireInterval);
    scene.remove(fireMesh);
  }, 4000);
}

// ===================== PARTICLES UPDATE =====================
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const ud = p.userData;

    // Apply velocity
    p.position.add(ud.vel.clone().multiplyScalar(dt));

    // Apply gravity based on type
    if (ud.type === 'debris') {
      ud.vel.y += (ud.gravity || -9.8) * dt;
      // Apply rotation
      if (ud.angularVel) {
        p.rotation.x += ud.angularVel.x * dt;
        p.rotation.y += ud.angularVel.y * dt;
        p.rotation.z += ud.angularVel.z * dt;
      }
    } else if (ud.type === 'smoke') {
      // Smoke rises and expands
      ud.vel.y += 0.5 * dt;
      ud.vel.x *= 0.98;
      ud.vel.z *= 0.98;
      p.scale.multiplyScalar(1 + dt * 0.5);
    } else {
      // Default gravity
      ud.vel.y -= 5 * dt;
    }

    // Age and opacity
    ud.age += dt;
    if (p.material.transparent) {
      p.material.opacity = Math.max(0, 1 - ud.age / ud.life);
    }

    // Remove dead particles
    if (ud.age > ud.life) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }
}

// ===================== MAIN UPDATE - DELTA FORCE STYLE =====================
function update(dt) {
  if (gameOver || !gameStarted) return;

  // 战术姿态切换
  if (keys['KeyC'] && player.stance !== STANCE.CROUCH) {
    player.stance = STANCE.CROUCH;
    keys['KeyC'] = false;
  } else if (keys['KeyZ'] && player.stance !== STANCE.PRONE) {
    player.stance = STANCE.PRONE;
    keys['KeyZ'] = false;
  } else if ((keys['KeyX'] || (keys['Space'] && player.onGround)) && player.stance !== STANCE.STAND) {
    player.stance = STANCE.STAND;
    keys['KeyX'] = false;
    keys['Space'] = false;
  }

  // 速度根据姿态变化
  let baseSpeed = WALK_SPEED;
  let targetHeight = PLAYER_HEIGHT_STAND;
  if (player.stance === STANCE.CROUCH) {
    baseSpeed = CROUCH_SPEED;
    targetHeight = PLAYER_HEIGHT_CROUCH;
  } else if (player.stance === STANCE.PRONE) {
    baseSpeed = PRONE_SPEED;
    targetHeight = PLAYER_HEIGHT_PRONE;
  }

  // 移动
  const isSprinting = keys['ShiftLeft'] && player.stance === STANCE.STAND;
  const moveSpeed = (isSprinting ? SPRINT_SPEED : baseSpeed) * player.weapons[player.currentWeapon].movePenalty;
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));

  let moveDir = new THREE.Vector3();
  if (!searching) {
    if (keys['KeyW']) moveDir.add(forward);
    if (keys['KeyS']) moveDir.sub(forward);
    if (keys['KeyA']) moveDir.sub(right);
    if (keys['KeyD']) moveDir.add(right);
    if (moveDir.length() > 0) moveDir.normalize();
  }

  player.vel.x = moveDir.x * moveSpeed;
  player.vel.z = moveDir.z * moveSpeed;

  // 重力和起伏地形
  const newPos = player.pos.clone();
  newPos.x += player.vel.x * dt;
  newPos.z += player.vel.z * dt;

  // 边界
  const bound = MAP_SIZE * CELL / 2 - 5;
  newPos.x = Math.max(-bound, Math.min(bound, newPos.x));
  newPos.z = Math.max(-bound, Math.min(bound, newPos.z));

  // 建筑碰撞
  for (const b of buildings) {
    if (newPos.x > b.x - b.w - 0.3 && newPos.x < b.x + b.w + 0.3 &&
      newPos.z > b.z - b.d - 0.3 && newPos.z < b.z + b.d + 0.3) {
      const dx = newPos.x - b.x, dz = newPos.z - b.z;
      if (Math.abs(dx / b.w) > Math.abs(dz / b.d)) {
        newPos.x = dx > 0 ? b.x + b.w + 0.3 : b.x - b.w - 0.3;
      } else {
        newPos.z = dz > 0 ? b.z + b.d + 0.3 : b.z - b.d - 0.3;
      }
    }
  }

  // 掩体碰撞
  for (const c of covers) {
    const hw = c.w + 0.3, hd = c.d + 0.3;
    if (newPos.x > c.x - hw && newPos.x < c.x + hw &&
      newPos.z > c.z - hd && newPos.z < c.z + hd) {
      const dx = newPos.x - c.x, dz = newPos.z - c.z;
      if (Math.abs(dx / c.w) > Math.abs(dz / c.d)) {
        newPos.x = dx > 0 ? c.x + hw : c.x - hw;
      } else {
        newPos.z = dz > 0 ? c.z + hd : c.z - hd;
      }
    }
  }

  // 道具碰撞
  for (const p of props) {
    if (p.type === 'tree' || p.type === 'rock') {
      const dx = newPos.x - p.x, dz = newPos.z - p.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      const minDist = p.size + 0.3;
      if (dist < minDist) {
        const ratio = minDist / dist;
        newPos.x = p.x + dx * ratio;
        newPos.z = p.z + dz * ratio;
      }
    }
  }

  // 适应地形高度 - 平滑过渡
  const terrainY = getTerrainHeight(newPos.x, newPos.z);
  const desiredY = terrainY + targetHeight;
  newPos.y += (desiredY - newPos.y) * Math.min(1, dt * 10);

  player.pos.copy(newPos);

  camera.position.copy(player.pos);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  // ADS interpolation
  adsProgress += (isADS ? 1 : -1) * dt * 8;
  adsProgress = Math.max(0, Math.min(1, adsProgress));
  // Determine scope type for FOV and reticle
  const currentMods = weaponMods[player.currentWeapon];
  const scopeName = currentMods ? currentMods.scope : null;
  let scopeFov = ADS_FOV;
  if (scopeName === 'ACOG 2x') scopeFov = 25;
  else if (scopeName === '全息瞄准镜') scopeFov = 35;
  else if (scopeName === '红点瞄准镜') scopeFov = 38;
  camera.fov = NORMAL_FOV + (scopeFov - NORMAL_FOV) * adsProgress;
  camera.updateProjectionMatrix();
  const crosshairEl = document.getElementById('crosshair');
  if (scopeName && adsProgress > 0.5) {
    crosshairEl.style.display = 'none';
  } else {
    crosshairEl.style.display = 'block';
    crosshairEl.classList.toggle('ads', adsProgress > 0.5);
  }
  // Scope overlay
  const scopeOverlay = document.getElementById('scope-overlay');
  if (scopeName && adsProgress > 0.5) {
    scopeOverlay.style.display = 'block';
    scopeOverlay.style.opacity = Math.min(1, (adsProgress - 0.5) * 4);
    updateScopeReticle(scopeName);
  } else {
    scopeOverlay.style.display = 'none';
  }

  // Weapon sway and breathing
  const wg = weaponGroups[player.currentWeapon];
  const t = performance.now() / 1000;
  const swayAmt = 1 - adsProgress * 0.8;
  const isMoving = moveDir.length() > 0;

  // Idle breathing sway
  const breathX = Math.sin(t * 1.2) * 0.002 * swayAmt;
  const breathY = Math.cos(t * 1.5) * 0.0015 * swayAmt;

  // Movement bobbing
  const moveBobX = isMoving ? Math.sin(t * 8) * 0.006 * swayAmt : 0;
  const moveBobY = isMoving ? Math.abs(Math.cos(t * 8)) * 0.004 * swayAmt : 0;

  // Sprint shake
  const sprintShake = (isSprinting && isMoving) ? Math.sin(t * 12) * 0.008 : 0;

  // Weapon rotation sway
  const rotSwayX = Math.sin(t * 1.3) * 0.005 * swayAmt;
  const rotSwayZ = Math.cos(t * 1.1) * 0.003 * swayAmt;

  const hip = HIP_POSITIONS[player.currentWeapon];
  const adsp = ADS_POSITIONS[player.currentWeapon];
  // Scope offset: raise weapon slightly to align with scope view
  let scopeOffsetY = 0, scopeOffsetZ = 0;
  if (scopeName) {
    scopeOffsetY = 0.015;
    scopeOffsetZ = 0.02;
  }
  wg.position.x = hip.x + (adsp.x - hip.x) * adsProgress + breathX + moveBobX + sprintShake;
  wg.position.y = hip.y + (adsp.y - hip.y + scopeOffsetY) * adsProgress + breathY + moveBobY;
  wg.position.z = hip.z + (adsp.z - hip.z + scopeOffsetZ) * adsProgress;

  // Apply rotation sway with recoil
  wg.rotation.x = rotSwayX * swayAmt - recoilX;
  wg.rotation.z = rotSwayZ * swayAmt - recoilZ * 0.5;

  // Recover recoil
  recoilX *= 0.85;
  recoilY *= 0.85;
  recoilZ *= 0.85;

  // Muzzle flash fade
  muzzleFlash.children.forEach(child => {
    if (child.isPointLight) {
      if (child.intensity > 0) child.intensity -= dt * 30;
    } else if (child.material && child.material.opacity > 0) {
      child.material.opacity -= dt * 15;
    }
  });

  // Continuous fire for auto weapons
  // Shooting
  if (mouseDown) shoot();

  // Pickup bob
  for (const p of pickups) {
    p.userData.bobPhase += dt * 3;
    p.position.y = 0.5 + Math.sin(p.userData.bobPhase) * 0.15;
    p.rotation.y += dt * 2;
  }

  // Container bob
  for (const c of containers) {
    if (!c.searched) {
      c.mesh.userData.bobPhase = (c.mesh.userData.bobPhase || 0) + dt * 2;
    }
  }

  updateEnemies(dt);
  updateBullets(dt);
  updateParticles(dt);
  updateSmoke(dt);
  updateBrassCasings(dt);
  updateHUD();
  updateMinimap();

  // Hints
  updateHints();
}

function updateHints() {
  const pickupHint = document.getElementById('pickup-hint');
  const containerHint = document.getElementById('container-hint');
  const extractHint = document.getElementById('extract-hint');
  pickupHint.style.display = 'none';
  containerHint.style.display = 'none';

  for (const p of pickups) {
    if (player.pos.distanceTo(p.position) < 2.5) {
      pickupHint.style.display = 'block';
      pickupHint.textContent = '[E] 拾取 ' + (p.userData.type === 'health' ? '医疗包' : p.userData.type === 'ammo' ? '弹药' : p.userData.type === 'loot' ? '物资' : '配件');
      break;
    }
  }

  for (const c of containers) {
    if (!c.searched && player.pos.distanceTo(new THREE.Vector3(c.x, 0, c.z)) < 2.5) {
      containerHint.style.display = 'block';
      const typeNames = { normal: '战术箱', ammo_crate: '弹药箱', gear_crate: '装备箱', safe: '保险箱' };
      containerHint.textContent = '[E] 搜索 ' + (typeNames[c.type] || '容器');
      break;
    }
  }

  if (extractActive && !extractInterval) {
    const { zone, dist } = findNearestExtractZone();
    if (zone && dist < 4) {
      extractHint.style.display = 'block';
      document.getElementById('extract-text').textContent = '[F] 集合撤离 (10秒)';
    } else {
      extractHint.style.display = 'none';
    }
  }
}

function updateMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 150, 150);
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, 150, 150);
  const scale = 150 / (MAP_SIZE * CELL);
  const cx = 75, cy = 75;

  // Buildings
  ctx.fillStyle = '#555';
  for (const b of buildings) {
    const x = cx + (b.x - player.pos.x) * scale;
    const y = cy + (b.z - player.pos.z) * scale;
    ctx.fillRect(x - b.w * scale, y - b.d * scale, b.w * 2 * scale, b.d * 2 * scale);
  }

  // Enemies
  ctx.fillStyle = '#f44';
  for (const e of enemies) {
    const x = cx + (e.position.x - player.pos.x) * scale;
    const y = cy + (e.position.z - player.pos.z) * scale;
    ctx.beginPath(); ctx.arc(x, y, e.userData.type === 'boss' ? 4 : 2, 0, Math.PI * 2); ctx.fill();
  }

  // Extraction zones
  if (extractActive) {
    ctx.fillStyle = '#4f4';
    for (const z of extractZones) {
      const ed = z.userData;
      const x = cx + (ed.x - player.pos.x) * scale;
      const y = cy + (ed.z - player.pos.z) * scale;
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Player
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx - Math.sin(player.yaw) * 8, cy - Math.cos(player.yaw) * 8);
  ctx.stroke();
}

// ===================== RENDER LOOP =====================
let frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.elapsedTime;

  // Update cloud positions (billboard + drift)
  if (window._cloudGroup) {
    window._cloudGroup.children.forEach(c => {
      if (c.userData.isCloud) {
        // Drift slowly
        c.position.x = c.userData.baseX + Math.sin(elapsed * c.userData.speed * 0.1) * 5;
        c.position.z = c.userData.baseZ + Math.cos(elapsed * c.userData.speed * 0.08) * 3;
        // Billboard: face camera
        c.lookAt(camera.position);
        // Update shader time
        if (c.material.uniforms) c.material.uniforms.time.value = elapsed;
      }
    });
  }

  // Update grass wind animation (vertex displacement)
  if (window._grassMesh && window._grassMesh.userData.basePositions) {
    const mesh = window._grassMesh;
    const basePos = mesh.userData.basePositions;
    const posAttr = mesh.geometry.getAttribute('position');
    const count = posAttr.count;
    // Every 3 vertices = one triangle; every 6 vertices = one cross-blade
    for (let i = 0; i < count; i += 3) {
      const bx = basePos[i * 3];
      const by = basePos[i * 3 + 1];
      const bz = basePos[i * 3 + 2];
      // Tip vertex (3rd in each triangle) gets wind offset
      const tx = basePos[(i + 2) * 3];
      const ty = basePos[(i + 2) * 3 + 1];
      const tz = basePos[(i + 2) * 3 + 2];
      const windPhase = tx * 0.5 + tz * 0.3 + elapsed * 2.0;
      const windX = Math.sin(windPhase) * 0.08;
      const windZ = Math.cos(windPhase * 0.7) * 0.04;
      // Only move tip vertex
      posAttr.setX(i + 2, tx + windX);
      posAttr.setZ(i + 2, tz + windZ);
    }
    posAttr.needsUpdate = true;
  }

  update(dt);
  renderer.render(scene, camera);
  frameCount++;
  if (frameCount === 1 || frameCount % 60 === 0) {
    console.log('[Render] frame=' + frameCount + ' scene.children=' + scene.children.length +
      ' rendererSize=' + renderer.domElement.width + 'x' + renderer.domElement.height);
  }
}

// ===================== GAME FLOW =====================
function startGame() {
  try {
    console.log('[Game] startGame called');
    resetGameState();
    console.log('[Game] resetGameState done');

    // Cleanup old renderer
    if (renderer) {
      renderer.dispose();
      const oldCanvas = renderer.domElement;
      if (oldCanvas && oldCanvas.parentNode) oldCanvas.remove();
      renderer = null;
    }

    console.log('[Game] calling init()');
    init();
    console.log('[Game] init done');

    spawnEnemies();
    console.log('[Game] enemies spawned');

    gameState = ST.PLAYING;
    gameStarted = true;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('hud').style.display = 'block';

    // Start ambient sounds
    try {
      startAmbientSounds();
      // Play distant explosions periodically
      setInterval(() => {
        if (gameState === ST.PLAYING && Math.random() > 0.7) {
          playDistantExplosion();
        }
      }, 15000);
    } catch(e) { console.warn('Ambient sound failed:', e); }

    try { document.body.requestPointerLock(); } catch(e) { console.warn('PointerLock failed:', e); }

    console.log('[Game] starting animate');
    animate();
    console.log('[Game] animate started');
  } catch(e) {
    console.error('[Game] startGame error:', e);
    alert('游戏启动出错: ' + e.message);
  }
}

function endGame(success) {
  gameOver = true;
  gameState = ST.GAMEOVER;
  document.exitPointerLock();
  const go = document.getElementById('game-over');
  go.style.display = 'flex';
  if (success) {
    document.getElementById('go-title').textContent = '成功撤离';
    document.getElementById('go-title').className = 'extract-success';
    document.getElementById('go-msg').textContent = '威胁等级提升，准备应对更强敌方';
  } else {
    document.getElementById('go-title').textContent = '行动失败';
    document.getElementById('go-title').className = '';
    document.getElementById('go-msg').textContent = '准备重新部署';
  }
  document.getElementById('go-loot').textContent = '缴获物资: ' + player.loot;
  document.getElementById('go-kills').textContent = '消灭敌人: ' + player.kills;
}
