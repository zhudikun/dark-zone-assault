function addToBackpack(item) {
  // Stack if exists
  const existing = backpack.find(b => b.name === item.name);
  if (existing) { existing.qty += item.qty; return true; }
  if (backpack.length >= BACKPACK_SIZE) return false;
  backpack.push(item);
  return true;
}

let gsWeaponIdx = 0;
function openGunsmith() {
  gameState = ST.GUNSMITH;

  document.getElementById('lobby').classList.remove('hidden');
  gameState = ST.LOBBY;
  updateWeaponAttachmentVisuals();
}
function renderGunsmith() {
  // Weapon tabs
  const tabs = document.getElementById('gs-weapons');
  tabs.innerHTML = '';
  WEAPONS.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'gs-wpn-btn' + (i === gsWeaponIdx ? ' active' : '');
    btn.textContent = w.name;
    btn.onclick = () => { gsWeaponIdx = i; renderGunsmith(); };
    tabs.appendChild(btn);
  });

  // Money display
  const moneyEl = document.getElementById('gs-money');
  if (moneyEl) moneyEl.textContent = '$' + money.toLocaleString();

  // Attachments
  const list = document.getElementById('gs-attachments');
  list.innerHTML = '';
  const slotNames = { scope: '光学瞄具', grip: '前握把', suppressor: '枪口装置', magazine: '弹匣', laser: '战术设备', stock: '枪托' };
  for (const [slot, options] of Object.entries(ATTACHMENTS)) {
    const label = document.createElement('div');
    label.style.cssText = 'font-size:12px;color:#666;margin-top:12px;margin-bottom:4px';
    label.textContent = slotNames[slot] || slot;
    list.appendChild(label);
    options.forEach(opt => {
      const div = document.createElement('div');
      const installed = weaponMods[gsWeaponIdx][slot] === opt.name;
      const owned = ownedAttachments.has(slot + ':' + opt.name);
      const canAfford = money >= opt.price;
      div.className = 'gs-attach' + (installed ? ' installed' : owned ? ' owned' : '');
      let btnHtml = '';
      if (installed) {
        btnHtml = '<div class="at-btn installed-btn">已装备 ✓</div>';
      } else if (owned) {
        btnHtml = '<div class="at-btn equip-btn">装备</div>';
      } else if (canAfford) {
        btnHtml = '<div class="at-btn buy-btn">购买 $' + opt.price + '</div>';
      } else {
        btnHtml = '<div class="at-btn locked-btn">$' + opt.price + ' (资金不足)</div>';
      }
      div.innerHTML = '<div class="at-info"><div class="at-name">' + opt.name + '</div><div class="at-desc">' + opt.desc + '</div></div>' + btnHtml;
      div.onclick = () => {
        if (installed) {
          weaponMods[gsWeaponIdx][slot] = null;
        } else if (owned) {
          weaponMods[gsWeaponIdx][slot] = opt.name;
        } else if (canAfford) {
          money -= opt.price;
          ownedAttachments.add(slot + ':' + opt.name);
          localStorage.setItem('dz_money', money);
          localStorage.setItem('dz_attachments', JSON.stringify([...ownedAttachments]));
          weaponMods[gsWeaponIdx][slot] = opt.name;
        }
        localStorage.setItem('dz_weaponMods', JSON.stringify(weaponMods));
        updateWeaponAttachmentVisuals();
        renderGunsmith();
      };
      list.appendChild(div);
    });
  }

  // Stats
  const w = WEAPONS[gsWeaponIdx];
  const mods = weaponMods[gsWeaponIdx];
  let sp = w.spread, mag = w.magSize, recoil = w.recoil;
  if (mods.scope) sp *= (ATTACHMENTS.scope.find(s => s.name === mods.scope)?.spreadMul || 1);
  if (mods.grip) recoil *= (ATTACHMENTS.grip.find(s => s.name === mods.grip)?.recoilMul || 1);
  if (mods.suppressor) { const sup = ATTACHMENTS.suppressor.find(s => s.name === mods.suppressor); if (sup && sup.recoilMul) recoil *= sup.recoilMul; }
  if (mods.stock) recoil *= (ATTACHMENTS.stock.find(s => s.name === mods.stock)?.recoilMul || 1);
  if (mods.magazine) mag = Math.floor(mag * (ATTACHMENTS.magazine.find(s => s.name === mods.magazine)?.magMul || 1));
  const stats = document.getElementById('gs-stats');
  stats.innerHTML = '<div style="font-size:12px;color:#3d5c3d;margin-bottom:6px;text-transform:uppercase">武器参数</div>' +
    '<div class="stat-row"><span>伤害</span><span class="val">' + w.damage + '</span></div>' +
    '<div class="stat-row"><span>射速</span><span class="val">' + w.fireRate + 'ms</span></div>' +
    '<div class="stat-row"><span>弹容量</span><span class="val">' + mag + '</span></div>' +
    '<div class="stat-row"><span>精度</span><span class="val">' + (100 - Math.round(sp * 1000)) + '%</span></div>' +
    '<div class="stat-row"><span>后坐力</span><span class="val">' + (recoil * 100).toFixed(0) + '%</span></div>' +
    '<div class="stat-row"><span>射程</span><span class="val">' + w.range + 'm</span></div>';

  // Simple 2D preview
  const canvas = document.getElementById('gs-preview');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 600, 500);
  ctx.fillStyle = '#333';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(w.name, 300, 260);
  ctx.fillStyle = '#555';
  ctx.font = '14px sans-serif';
  ctx.fillText('武器预览', 300, 290);
  // Draw equipped attachments
  ctx.fillStyle = '#3d5c3d';
  ctx.font = '12px sans-serif';
  let ay = 320;
  for (const [slot, name] of Object.entries(mods)) {
    if (name) { ctx.fillText('• ' + name, 300, ay); ay += 18; }
  }
  // Draw simple weapon silhouette
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (gsWeaponIdx === 0) {
    ctx.rect(250, 220, 100, 30);
    ctx.rect(280, 250, 20, 50);
  } else if (gsWeaponIdx === 1) {
    ctx.rect(200, 225, 200, 20);
    ctx.rect(230, 245, 80, 30);
    ctx.rect(280, 275, 30, 50);
  } else {
    ctx.rect(180, 220, 240, 25);
    ctx.rect(250, 245, 20, 60);
    ctx.rect(300, 270, 30, 40);
  }
  ctx.stroke();
}

  if (currentContainer) {
    currentContainer.forEach((item, idx) => {
      const div = createItemElement(item, () => takeFromContainer(idx), () => sellContainerItem(idx));
      containerGrid.appendChild(div);
    });
  }
  if (!currentContainer || currentContainer.length === 0) {
    containerGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:20px;text-transform:uppercase">无可用物资</div>';
  }

  // Render stash items
  const stashGrid = document.getElementById('stash-grid');
  stashGrid.innerHTML = '';
  stash.forEach((item, idx) => {
    const div = createItemElement(item, null, () => sellStashItem(idx));
    stashGrid.appendChild(div);
  });
  if (stash.length === 0) {
    stashGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#666;padding:20px;text-transform:uppercase">仓库为空</div>';
  }
}

function createItemElement(item, onClick, onRightClick) {
  const div = document.createElement('div');
  div.className = 'container-item ' + (item.rarity || 'common');
  div.innerHTML = '<div class="item-icon">' + item.icon + '</div>' +
    '<div class="item-name">' + item.name + '</div>' +
    '<div class="item-value">💰 ' + item.value + '</div>' +
    (item.qty > 1 ? '<div class="item-qty">x' + item.qty + '</div>' : '');
  if (onClick) div.addEventListener('click', onClick);
  if (onRightClick) div.addEventListener('contextmenu', (e) => { e.preventDefault(); onRightClick(); });
  return div;
}

function takeFromContainer(idx) {
  if (!currentContainer || idx >= currentContainer.length) return;
  const item = currentContainer[idx];
  // Immediate-use categories
  if (item.category === 'ammo') {
    // Add ammo to matching weapons
    const ammoMap = { pistol: [0], rifle: [2,4], shotgun: [4], sniper: [5], lmg: [3] };
    const weaponIds = ammoMap[item.ammoType] || [];
    weaponIds.forEach(wi => {
      const w = player.weapons[wi];
      if (w && !w.infinite) w.reserve += item.ammoQty;
    });
    currentContainer.splice(idx, 1);
    playSound('pickup');
    renderContainerUI();
    return;
  }
  if (item.category === 'medical') {
    player.hp = Math.min(player.maxHp, player.hp + item.healAmt);
    currentContainer.splice(idx, 1);
    playSound('pickup');
    renderContainerUI();
    return;
  }
  if (item.category === 'attachment') {
    // Give a random attachment from the slot
    const slotItems = ATTACHMENTS[item.attSlot];
    if (slotItems && slotItems.length > 0) {
      const att = slotItems[Math.floor(Math.random() * slotItems.length)];
      ownedAttachments.add(item.attSlot + ':' + att.name);
      localStorage.setItem('dz_attachments', JSON.stringify([...ownedAttachments]));
    }
    currentContainer.splice(idx, 1);
    playSound('pickup');
    renderContainerUI();
    return;
  }
  // Valuables go to stash
  if (stash.length >= STASH_SIZE) {
    const existing = stash.find(s => s.id === item.id);
    if (!existing) return;
  }
  const existing = stash.find(s => s.id === item.id);
  if (existing) {
    existing.qty += item.qty;
  } else {
    stash.push({ ...item });
  }
  currentContainer.splice(idx, 1);
  playSound('pickup');
  renderContainerUI();
}

function takeAllFromContainer() {
  if (!currentContainer) return;
  while (currentContainer.length > 0) {
    const item = currentContainer[0];
    if (stash.length >= STASH_SIZE) {
      const existing = stash.find(s => s.id === item.id);
      if (!existing) break;
    }
    takeFromContainer(0);
  }
}

function sellStashItem(idx) {
  if (idx >= stash.length) return;
  const item = stash[idx];
  const value = item.value * item.qty;
  money += value;
  stash.splice(idx, 1);
  localStorage.setItem('dz_money', money);
  playSound('pickup');
  renderContainerUI();
}

function sellContainerItem(idx) {
  if (!currentContainer || idx >= currentContainer.length) return;
  const item = currentContainer[idx];
  const value = item.value * item.qty;
  money += value;
  currentContainer.splice(idx, 1);
  localStorage.setItem('dz_money', money);
  playSound('pickup');
  renderContainerUI();
}

function sellAllStash() {
  let totalValue = 0;
  stash.forEach(item => { totalValue += item.value * item.qty; });
  money += totalValue;
  stash = [];
  localStorage.setItem('dz_money', money);
  playSound('pickup');
  renderContainerUI();
}

// ===================== LOBBY =====================
function updateLobbyStats() {
  document.getElementById('stat-extractions').textContent = extractionCount;
  document.getElementById('stat-kills').textContent = totalKills;
  document.getElementById('stat-loot').textContent = totalLoot;
  document.getElementById('stat-money').textContent = money.toLocaleString();
}

function initLobby() {
  const mapSelect = document.getElementById('map-select');
  mapSelect.innerHTML = '';
  MAPS.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'map-card' + (i === 0 ? ' selected' : '');
    card.innerHTML = '<div class="map-icon">' + m.icon + '</div><div class="map-name">' + m.name + '</div><div class="map-desc">' + m.desc + '</div>';
    card.onclick = () => {
      document.querySelectorAll('.map-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedMap = i;
    };
    mapSelect.appendChild(card);
  });
  selectedMap = 0;
  updateLobbyStats();
}

// ===================== POINTER LOCK =====================
document.addEventListener('pointerlockchange', () => {
  if (!document.pointerLockElement && gameStarted && !gameOver && gameState === ST.PLAYING) {
    // Paused
  }
});

// ===================== INIT LOBBY =====================
initLobby();
</script>
