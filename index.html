<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA FORCE - 三角洲行动</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#fff;user-select:none}
canvas{display:block}

/* Vignette overlay */
#vignette{position:fixed;inset:0;pointer-events:none;z-index:50;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.55) 100%);
  mix-blend-mode:multiply}

/* Color grading - warm golden hour feel */
#color-grade{position:fixed;inset:0;pointer-events:none;z-index:51;
  background:linear-gradient(180deg,rgba(30,20,10,0.08) 0%,transparent 25%,transparent 75%,rgba(15,10,5,0.15) 100%);
  mix-blend-mode:overlay}

/* Atmospheric haze */
#atmo-haze{position:fixed;inset:0;pointer-events:none;z-index:49;
  background:radial-gradient(ellipse at 60% 40%,rgba(255,238,200,0.04) 0%,transparent 60%);
  mix-blend-mode:screen}

/* Film grain effect */
#film-grain{position:fixed;inset:0;pointer-events:none;z-index:52;opacity:0.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:256px 256px;mix-blend-mode:overlay}

/* Scanlines effect */
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:53;opacity:0.03;
  background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,0.3) 1px,rgba(0,0,0,0.3) 2px);
  background-size:100% 2px}

/* ===== LOBBY ===== */
#lobby{position:fixed;inset:0;background:linear-gradient(180deg,#0a0f0a 0%,#1a2a1a 50%,#0a1a0a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#lobby.hidden{opacity:0;pointer-events:none}
#lobby h1{font-size:48px;color:#3d5c3d;text-shadow:0 0 20px rgba(61,92,61,.8);letter-spacing:8px;margin-bottom:4px;font-weight:bold}
#lobby .subtitle{font-size:14px;color:#4a6a4a;margin-bottom:40px;letter-spacing:4px;text-transform:uppercase}
.lobby-stats{display:flex;gap:20px;margin-bottom:30px}
.lobby-stats .stat{background:rgba(0,0,0,.4);border:1px solid rgba(61,92,61,.3);padding:10px 20px;text-align:center}
.lobby-stats .stat .val{font-size:24px;color:#ffcc00;font-weight:bold;font-family:'Courier New',monospace}
.lobby-stats .stat .lbl{font-size:10px;color:#4a6a4a;margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.map-select{display:flex;gap:12px;margin-bottom:30px}
.map-card{width:180px;padding:16px;background:rgba(0,0,0,.3);border:1px solid rgba(61,92,61,.2);cursor:pointer;transition:all .2s;text-align:center}
.map-card:hover,.map-card.selected{border-color:#3d5c3d;background:rgba(61,92,61,.15)}
.map-card .map-icon{font-size:32px;margin-bottom:8px}
.map-card .map-name{font-size:14px;font-weight:bold;margin-bottom:4px;color:#ccc}
.map-card .map-desc{font-size:10px;color:#666;line-height:1.4}
.lobby-btns{display:flex;gap:12px}
.lobby-btn{padding:12px 28px;font-size:14px;border:none;cursor:pointer;letter-spacing:2px;transition:all .2s;font-weight:bold;text-transform:uppercase;font-family:'Courier New',monospace}
.lobby-btn.primary{background:#3d5c3d;color:#fff;border:1px solid #4a7a4a}
.lobby-btn.primary:hover{background:#4a7a4a}
.lobby-btn.secondary{background:rgba(0,0,0,.3);color:#888;border:1px solid rgba(100,100,100,.3)}
.lobby-btn.secondary:hover{background:rgba(100,100,100,.1);color:#aaa}

/* ===== INVENTORY ===== */
#inventory{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:150}
#inventory.open{display:flex}
#inventory h2{font-size:20px;margin-bottom:16px;color:#3d5c3d;text-transform:uppercase;letter-spacing:3px}
.inv-grid{display:grid;grid-template-columns:repeat(6,64px);grid-template-rows:repeat(4,64px);gap:4px;margin-bottom:16px}
.inv-slot{width:64px;height:64px;background:rgba(0,0,0,.4);border:1px solid rgba(100,100,100,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative}
.inv-slot:hover{border-color:#3d5c3d;background:rgba(61,92,61,.1)}
.inv-slot .item-icon{font-size:20px}
.inv-slot .item-name{font-size:7px;color:#888;margin-top:2px}
.inv-slot .item-qty{position:absolute;top:2px;right:3px;font-size:9px;color:#ffcc00}
.inv-slot.equipped{border-color:#44aa44;background:rgba(68,170,68,.1)}
.inv-close{margin-top:16px;padding:8px 24px;background:#3d5c3d;border:1px solid #4a7a4a;color:#fff;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.inv-info{margin-top:8px;font-size:11px;color:#666;text-align:center}

/* ===== GUNSMITH ===== */
#gunsmith{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:row;z-index:160}
#gunsmith.open{display:flex}
.gs-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.gs-right{width:320px;background:rgba(0,0,0,.5);border-left:1px solid rgba(61,92,61,.2);padding:24px;overflow-y:auto}
.gs-right h3{font-size:16px;color:#3d5c3d;margin-bottom:12px;text-transform:uppercase;letter-spacing:2px}
.gs-weapon-select{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.gs-wpn-btn{padding:6px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(100,100,100,.2);color:#888;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.gs-wpn-btn.active{border-color:#3d5c3d;color:#fff;background:rgba(61,92,61,.2)}
.gs-attach{padding:8px 12px;background:rgba(0,0,0,.2);border:1px solid rgba(100,100,100,.15);cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.gs-attach:hover{border-color:#3d5c3d}
.gs-attach.installed{border-color:#44aa44;background:rgba(68,170,68,.1)}
.gs-attach.owned{border-color:#5588cc;background:rgba(68,136,204,.05)}
.gs-attach .at-info{flex:1}
.gs-attach .at-name{font-size:12px;font-weight:bold}
.gs-attach .at-desc{font-size:10px;color:#666;margin-top:2px}
.at-btn{font-size:10px;padding:4px 10px;border:1px solid rgba(100,100,100,.3);text-transform:uppercase;font-family:'Courier New',monospace;white-space:nowrap}
.buy-btn{color:#ffcc00;border-color:rgba(255,204,0,.3)}
.buy-btn:hover{background:rgba(255,204,0,.1)}
.equip-btn{color:#44aa44;border-color:rgba(68,170,68,.3)}
.equip-btn:hover{background:rgba(68,170,68,.1)}
.installed-btn{color:#228822;border-color:rgba(34,136,34,.3);background:rgba(34,136,34,.05)}
.locked-btn{color:#555;border-color:rgba(80,80,80,.2)}
.gs-money{font-size:14px;color:#ffcc00;font-weight:bold;font-family:'Courier New',monospace;margin-bottom:12px}
.gs-stats{margin-top:12px;padding:10px;background:rgba(0,0,0,.3);border:1px solid rgba(100,100,100,.15)}
.gs-stats .stat-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#888}
.gs-stats .stat-row .val{color:#ffcc00}
.gs-close{position:absolute;top:16px;right:16px;padding:6px 16px;background:#3d5c3d;border:1px solid #4a7a4a;color:#fff;cursor:pointer;font-size:12px;z-index:10;text-transform:uppercase}

/* ===== HUD ===== */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;font-family:'Courier New',monospace;display:none}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.6)}
#crosshair::before{width:1px;height:20px;left:9px;top:0}
#crosshair::after{width:20px;height:1px;top:9px;left:0}
#crosshair.ads::before{height:12px;left:5px;top:0}
#crosshair.ads::after{width:12px;top:5px;left:0}
#crosshair.ads{width:12px;height:12px}
#scope-overlay{position:fixed;inset:0;pointer-events:none;z-index:11;display:none}
#scope-reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#scope-vignette{position:absolute;inset:0;background:radial-gradient(circle at center,transparent 35%,rgba(0,0,0,0.6) 70%,rgba(0,0,0,0.95) 100%)}
#scope-label{position:absolute;top:12%;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:10px;font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase}
#hp-bar-container{position:absolute;bottom:30px;left:30px;width:200px;height:6px;background:rgba(0,0,0,.5);overflow:hidden;border:1px solid rgba(100,100,100,.3)}
#hp-bar{height:100%;width:100%;background:#3d5c3d;transition:width .3s}
#hp-text{position:absolute;bottom:40px;left:30px;color:#aaa;font-size:11px;text-shadow:0 1px 2px rgba(0,0,0,.8);letter-spacing:1px}
#ammo-display{position:absolute;bottom:30px;right:30px;text-align:right;color:#fff;font-size:28px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,.8);font-family:'Courier New',monospace}
#ammo-display .weapon-name{font-size:11px;color:#888;margin-bottom:2px;font-weight:normal;text-transform:uppercase}
#ammo-display .ammo-detail{font-size:12px;color:#aaa;margin-top:2px}
#wave-display{position:absolute;top:20px;left:50%;transform:translateX(-50%);text-align:center;color:#fff}
#wave-display .wave-num{font-size:20px;font-weight:bold;color:#ffcc00;letter-spacing:2px}
#wave-display .enemies-left{font-size:11px;color:#888;margin-top:2px;text-transform:uppercase}
#minimap{position:absolute;top:20px;left:20px;width:140px;height:140px;background:rgba(0,0,0,.6);border:1px solid rgba(61,92,61,.3);overflow:hidden}
#minimap canvas{width:100%;height:100%}
#weapon-info{position:absolute;bottom:60px;right:30px;text-align:right}
.weapon-slot{display:inline-block;padding:2px 8px;margin-left:4px;background:rgba(0,0,0,.4);border:1px solid rgba(100,100,100,.2);color:#666;font-size:10px;font-family:'Courier New',monospace}
.weapon-slot.active{border-color:#3d5c3d;color:#fff;background:rgba(61,92,61,.2)}
#pickup-hint{position:absolute;top:62%;left:50%;transform:translateX(-50%);color:#ffcc00;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,.8);display:none;text-transform:uppercase}
#container-hint{position:absolute;top:67%;left:50%;transform:translateX(-50%);color:#3d5c3d;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,.8);display:none;text-align:center;text-transform:uppercase}
#reload-indicator{position:absolute;top:55%;left:50%;transform:translateX(-50%);color:#ffcc00;font-size:14px;display:none;animation:pulse .5s infinite alternate;text-transform:uppercase}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
#wave-announce{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:20}
#wave-announce .big{font-size:48px;color:#ffcc00;font-weight:bold;text-shadow:0 0 30px rgba(255,204,0,.5);letter-spacing:4px}
#wave-announce .sub{font-size:14px;color:#888;margin-top:6px;text-transform:uppercase}
#extract-hint{position:absolute;top:72%;left:50%;transform:translateX(-50%);color:#44aa44;font-size:16px;text-shadow:0 1px 4px rgba(0,0,0,.8);display:none;text-transform:uppercase;text-align:center}
#extract-bar-wrap{width:260px;height:6px;background:rgba(0,0,0,.6);border:1px solid rgba(68,170,68,.4);border-radius:3px;margin-top:8px;overflow:hidden}
#extract-bar{width:0%;height:100%;background:linear-gradient(90deg,#44aa44,#66dd66);border-radius:3px;transition:width .3s linear}
#damage-overlay{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0) 100%);transition:background .1s}
#loot-display{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;color:#ffcc00;text-shadow:0 2px 4px rgba(0,0,0,.8)}
#loot-display .loot-label{font-size:10px;color:#888;text-transform:uppercase}
#loot-display #loot-count{font-size:20px;font-weight:bold}
#score-display{position:absolute;top:20px;right:30px;color:#ffcc00;font-size:16px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,.8);font-family:'Courier New',monospace}

/* ===== GAME OVER ===== */
#game-over{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:180}
#game-over h1{font-size:36px;color:#cc3333;margin-bottom:8px;text-transform:uppercase;letter-spacing:4px}
#game-over p{color:#888;font-size:14px;margin-bottom:6px}
#game-over button{margin-top:16px;padding:10px 32px;font-size:14px;background:#3d5c3d;color:#fff;border:1px solid #4a7a4a;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
#game-over button:hover{background:#4a7a4a}
.extract-success{color:#44aa44 !important}

/* ===== CONTAINER UI ===== */
#container-ui{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;z-index:200;padding:24px}
.container-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(61,92,61,.2)}
.container-header h3{font-size:18px;color:#ffcc00;margin:0;text-transform:uppercase;letter-spacing:2px}
.container-money{font-size:16px;color:#ffcc00;font-weight:bold;font-family:'Courier New',monospace}
.container-close{background:none;border:1px solid rgba(100,100,100,.3);color:#888;padding:6px 12px;cursor:pointer;font-size:12px;text-transform:uppercase}
.container-close:hover{background:rgba(100,100,100,.1);color:#aaa}
.container-body{display:flex;gap:16px;flex:1;overflow:hidden}
.container-left,.container-right{flex:1;display:flex;flex-direction:column}
.container-label{font-size:12px;color:#888;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:1px}
.container-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1;overflow-y:auto;padding:8px;background:rgba(0,0,0,.3);border:1px solid rgba(100,100,100,.1)}
.container-item{background:rgba(0,0,0,.3);border:1px solid rgba(100,100,100,.15);padding:8px;cursor:pointer;transition:all .15s;text-align:center;position:relative}
.container-item:hover{background:rgba(61,92,61,.1);border-color:#3d5c3d}
.container-item .item-icon{font-size:24px;margin-bottom:4px}
.container-item .item-name{font-size:10px;color:#ccc;margin-bottom:2px}
.container-item .item-value{font-size:9px;color:#ffcc00;font-family:'Courier New',monospace}
.container-item .item-qty{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#ffcc00;font-size:9px;padding:1px 4px;font-family:'Courier New',monospace}
.container-item.common{border-color:rgba(100,100,100,.2)}
.container-item.uncommon{border-color:rgba(68,170,68,.3);background:rgba(68,170,68,.05)}
.container-item.rare{border-color:rgba(255,204,0,.3);background:rgba(255,204,0,.05)}
.container-actions{display:flex;flex-direction:column;gap:8px;justify-content:center;padding:0 8px}
.container-btn{padding:10px 16px;border:1px solid rgba(100,100,100,.3);cursor:pointer;font-size:11px;font-weight:bold;transition:all .15s;text-transform:uppercase;font-family:'Courier New',monospace}
.container-btn:hover{border-color:#3d5c3d}
.take-all{background:rgba(61,92,61,.2);color:#fff;border-color:#3d5c3d}
.take-all:hover{background:rgba(61,92,61,.3)}
.sell-all{background:rgba(255,136,0,.2);color:#fff;border-color:#ff8800}
.sell-all:hover{background:rgba(255,136,0,.3)}
.container-footer{text-align:center;color:#666;font-size:10px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(100,100,100,.1);text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>DELTA FORCE</h1>
  <div class="subtitle">三角洲特种部队 - 战术行动指挥部</div>
  <div class="lobby-stats">
    <div class="stat"><div class="val" id="stat-extractions">0</div><div class="lbl">成功撤离</div></div>
    <div class="stat"><div class="val" id="stat-kills">0</div><div class="lbl">消灭敌人</div></div>
    <div class="stat"><div class="val" id="stat-loot">0</div><div class="lbl">缴获物资</div></div>
    <div class="stat"><div class="val" id="stat-money">0</div><div class="lbl">行动资金</div></div>
  </div>
  <div class="map-select" id="map-select"></div>
  <div class="lobby-btns">
    <button class="lobby-btn secondary" onclick="openInventory()">装备</button>
    <button class="lobby-btn secondary" onclick="openGunsmith()">武器</button>
    <button class="lobby-btn secondary" onclick="openStashUI()">仓库</button>
    <button class="lobby-btn primary" onclick="startGame()">开始行动</button>
  </div>
</div>

<!-- INVENTORY -->
<div id="inventory">
  <h2>装备清单</h2>
  <div class="inv-grid" id="inv-grid"></div>
  <div class="inv-info" id="inv-info">ESC 关闭</div>
  <button class="inv-close" onclick="closeInventory()">关闭装备</button>
</div>

<!-- GUNSMITH -->
<div id="gunsmith">
  <button class="gs-close" onclick="closeGunsmith()">关闭改装</button>
  <div class="gs-left">
    <canvas id="gs-preview" width="600" height="500"></canvas>
  </div>
  <div class="gs-right">
    <h3>武器改装台</h3>
    <div class="gs-money">行动资金: <span id="gs-money">$0</span></div>
    <div class="gs-weapon-select" id="gs-weapons"></div>
    <div id="gs-attachments"></div>
    <div class="gs-stats" id="gs-stats"></div>
  </div>
</div>

<!-- CONTAINER UI -->
<div id="container-ui">
  <div class="container-header">
    <h3 id="container-title">搜索</h3>
    <div class="container-money">行动资金: $<span id="container-money-val">0</span></div>
    <button class="container-close" onclick="closeContainerUI()">关闭搜索</button>
  </div>
  <div class="container-body">
    <div class="container-left">
      <div class="container-label">可用物资</div>
      <div class="container-grid" id="container-grid"></div>
    </div>
    <div class="container-actions">
      <button class="container-btn take-all" onclick="takeAllFromContainer()">全部拾取</button>
      <button class="container-btn sell-all" onclick="sellAllStash()">全部出售</button>
    </div>
    <div class="container-right">
      <div class="container-label">战术仓库 [ <span id="stash-count">0/32</span> ]</div>
      <div class="container-grid" id="stash-grid"></div>
    </div>
  </div>
  <div class="container-footer">ESC 关闭 | 左键拾取 | 右键出售</div>
</div>

<!-- Post-processing overlays -->
<div id="atmo-haze"></div>
<div id="vignette"></div>
<div id="color-grade"></div>
<div id="film-grain"></div>
<div id="scanlines"></div>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"></div>
  <div id="scope-overlay">
    <div id="scope-vignette"></div>
    <svg id="scope-reticle" width="300" height="300" viewBox="0 0 300 300"></svg>
    <div id="scope-label"></div>
  </div>
  <div id="wave-display"><div class="wave-num">敌方剩余: 0</div><div class="enemies-left">消灭敌方目标</div></div>
  <div id="hp-text">HP: 100</div>
  <div id="hp-bar-container"><div id="hp-bar"></div></div>
  <div id="ammo-display"><div class="weapon-name">手枪</div><div>15 / ∞</div></div>
  <div id="loot-display"><div class="loot-label">缴获</div><div id="loot-count">0</div></div>
  <div id="score-display">SCORE: 0</div>
  <div id="minimap"><canvas id="minimap-canvas" width="150" height="150"></canvas></div>
  <div id="weapon-info">
    <span class="weapon-slot active">1 M9</span>
    <span class="weapon-slot">2 MP5</span>
    <span class="weapon-slot">3 M16</span>
    <span class="weapon-slot">4 M60</span>
    <span class="weapon-slot">5 REM</span>
    <span class="weapon-slot">6 M40</span>
  </div>
  <div id="pickup-hint"></div>
  <div id="container-hint"></div>
  <div id="reload-indicator">RELOADING...</div>
  <div id="search-progress-container" style="display:none;position:absolute;top:60%;left:50%;transform:translateX(-50%);width:260px;text-align:center;">
    <div id="search-progress-text" style="color:#ffcc00;font-size:13px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">搜索中...</div>
    <div style="width:100%;height:6px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,204,0,0.3);">

// 容器内容生成（按容器类型调整权重）
function generateContainerLoot(count, containerType) {
  const weights = {
    normal:     { valuables: 0.40, ammo: 0.25, medical: 0.25, attachment: 0.10 },
    ammo_crate: { valuables: 0.10, ammo: 0.55, medical: 0.25, attachment: 0.10 },
    gear_crate: { valuables: 0.15, ammo: 0.20, medical: 0.25, attachment: 0.40 },
    safe:       { valuables: 0.60, ammo: 0.10, medical: 0.20, attachment: 0.10 }
  };
  const w = weights[containerType] || weights.normal;
  const items = [];
  for (let i = 0; i < count; i++) {
    // Pick category by weight
    const catRoll = Math.random();
    let cat, cum = 0;
    for (const [c, p] of Object.entries(w)) { cum += p; if (catRoll < cum) { cat = c; break; } }
    if (!cat) cat = 'valuables';
    // Pick item from category, weighted by rarity
    const catItems = LOOT_ITEMS.filter(it => it.category === cat);
    if (catItems.length === 0) continue;
    const rarityRoll = Math.random();
    let rarityPool;
    if (cat === 'safe') { rarityPool = rarityRoll < 0.3 ? 'common' : rarityRoll < 0.7 ? 'uncommon' : 'rare'; }
    else { rarityPool = rarityRoll < 0.55 ? 'common' : rarityRoll < 0.85 ? 'uncommon' : 'rare'; }
    let pool = catItems.filter(it => it.rarity === rarityPool);
    if (pool.length === 0) pool = catItems;
    const item = pool[Math.floor(Math.random() * pool.length)];
    const existing = items.find(it => it.id === item.id);
    if (existing) existing.qty++;
    else items.push({ ...item, qty: 1 });
  }
  return items;
}

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  const ctx = getAudio();
  const t = ctx.currentTime;
  if (type === 'shoot') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const noise = ctx.createOscillator();
    const ng = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(50, t + 0.1);
    gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    noise.type = 'square'; noise.frequency.setValueAtTime(800, t);
    ng.gain.setValueAtTime(0.15, t); ng.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
    osc.connect(gain); gain.connect(ctx.destination);
    noise.connect(ng); ng.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
    noise.start(t); noise.stop(t + 0.08);
  } else if (type === 'shotgun') {
    const noise = ctx.createOscillator();
    const gain = ctx.createGain();
    noise.type = 'square'; noise.frequency.setValueAtTime(300, t);
    noise.frequency.exponentialRampToValueAtTime(30, t + 0.2);
    gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    noise.connect(gain); gain.connect(ctx.destination);
    noise.start(t); noise.stop(t + 0.3);
  } else if (type === 'rifle') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.06);
    gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.1);
  } else if (type === 'reload_magout') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);
    gain.gain.setValueAtTime(0.12, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.25);
  } else if (type === 'reload_magin') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.12);
    gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.25);
  } else if (type === 'reload_bolt') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(600, t);
    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
  } else if (type === 'hit') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);
    gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.12);
  } else if (type === 'enemy_hit') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
    gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.2);
  } else if (type === 'crossbow') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.2);
    gain.gain.setValueAtTime(0.25, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.35);
  } else if (type === 'knife') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(2000, t);
    osc.frequency.exponentialRampToValueAtTime(500, t + 0.08);
    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);

  } else if (type === 'pickup') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(1200, t + 0.15);

      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t + i * 0.15); osc.stop(t + i * 0.15 + 0.35);
    }
  }
}

// ===================== AMBIENT SOUNDS =====================
let ambientWindNode = null;
let ambientGainNode = null;

function startAmbientSounds() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  // Create wind noise using white noise filtered
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.5;
  }

  ambientWindNode = audioCtx.createBufferSource();
  ambientWindNode.buffer = buffer;
  ambientWindNode.loop = true;

  // Low pass filter for wind effect
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  filter.Q.value = 1;

  // Gain control
  ambientGainNode = audioCtx.createGain();
  ambientGainNode.gain.value = 0.03;

  ambientWindNode.connect(filter);
  filter.connect(ambientGainNode);
  ambientGainNode.connect(audioCtx.destination);

  ambientWindNode.start();

  // Modulate wind over time
  const now = audioCtx.currentTime;
  ambientGainNode.gain.setValueAtTime(0.03, now);
  ambientGainNode.gain.linearRampToValueAtTime(0.05, now + 5);
  ambientGainNode.gain.linearRampToValueAtTime(0.02, now + 10);
  ambientGainNode.gain.linearRampToValueAtTime(0.04, now + 15);
  ambientGainNode.gain.linearRampToValueAtTime(0.03, now + 20);
}

function stopAmbientSounds() {
  if (ambientWindNode) {
    ambientWindNode.stop();
    ambientWindNode = null;
  }
  if (ambientGainNode) {
    ambientGainNode.disconnect();
    ambientGainNode = null;
  }
}

// Play distant explosion sound
function playDistantExplosion() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Low frequency rumble
  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(40, t);
  osc1.frequency.exponentialRampToValueAtTime(20, t + 1);
  gain1.gain.setValueAtTime(0.08, t);
  gain1.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
  osc1.connect(gain1);
  gain1.connect(audioCtx.destination);
  osc1.start(t);
  osc1.stop(t + 2);

  // High frequency crack
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sawtooth';
  osc2.frequency.setValueAtTime(200, t + 0.1);
  osc2.frequency.exponentialRampToValueAtTime(50, t + 0.5);
  gain2.gain.setValueAtTime(0.05, t + 0.1);
  gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(t + 0.1);
  osc2.stop(t + 1);
}

// ===================== INIT =====================
function init() {
  console.log('[Init] Creating scene');
  scene = new THREE.Scene();

  // Create realistic sky with sun
  const skyGeo = new THREE.SphereGeometry(500, 64, 32);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      sunDirection: { value: sunDir },
      topColor: { value: new THREE.Color(0x1a3355) },
      horizonColor: { value: new THREE.Color(0x8899aa) },
      sunColor: { value: new THREE.Color(0xffeedd) },
      groundColor: { value: new THREE.Color(0x334422) },
      fogColor: { value: new THREE.Color(currentMap.skyColor) },
      fogDensity: { value: currentMap.fogDensity }
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      varying vec3 vNormal;
      void main() {
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        vNormal = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 sunDirection;
      uniform vec3 topColor;
      uniform vec3 horizonColor;
      uniform vec3 sunColor;
      uniform vec3 groundColor;
      uniform vec3 fogColor;
      uniform float fogDensity;
      varying vec3 vWorldPosition;
      varying vec3 vNormal;
      void main() {
        vec3 dir = normalize(vNormal);
        float y = dir.y;

        // Sky gradient
        vec3 sky = mix(horizonColor, topColor, pow(max(y, 0.0), 0.5));
        sky = mix(sky, groundColor, pow(max(-y, 0.0), 2.0));

        // Sun disc and glow - enhanced brightness
        float sunDot = dot(dir, sunDirection);
        float sunDisc = smoothstep(0.996, 0.999, sunDot);
        float sunGlow = pow(max(sunDot, 0.0), 48.0) * 0.8;
        float sunHalo = pow(max(sunDot, 0.0), 6.0) * 0.25;
        float sunBloom = pow(max(sunDot, 0.0), 2.0) * 0.08;
        sky += sunColor * sunDisc * 1.5;
        sky += sunColor * sunGlow;
        sky += sunColor * sunHalo;
        sky += sunColor * sunBloom;

        // Horizon haze - warmer near sun
        float horizonHaze = pow(1.0 - abs(y), 8.0) * 0.4;
        float sunHorizon = pow(max(sunDot, 0.0), 3.0) * pow(1.0 - abs(y), 4.0) * 0.3;
        sky += sunColor * horizonHaze;
        sky += vec3(1.0, 0.7, 0.3) * sunHorizon;

        // Atmospheric scattering - enhanced Tyndall effect
        float scatter = pow(max(sunDot, 0.0), 3.0) * pow(1.0 - y, 2.0) * 0.35;
        sky += vec3(1.0, 0.85, 0.5) * scatter;

        // Rayleigh scattering (blue sky away from sun)
        float rayleigh = pow(1.0 - max(sunDot, 0.0), 2.0) * max(y, 0.0) * 0.15;
        sky += vec3(0.3, 0.5, 1.0) * rayleigh;

        gl_FragColor = vec4(sky, 1.0);
      }
    `,
    side: THREE.BackSide
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  // ===================== VOLUMETRIC CLOUDS WITH TYNDALL EFFECT =====================
  createVolumetricClouds();

  scene.background = null;
  scene.fog = new THREE.FogExp2(currentMap.skyColor, currentMap.fogDensity);

  camera = new THREE.PerspectiveCamera(NORMAL_FOV, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.copy(player.pos);
  scene.add(camera);
  console.log('[Init] Camera created');

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.physicallyCorrectLights = true;
  document.body.appendChild(renderer.domElement);
  console.log('[Init] Renderer created');

  clock = new THREE.Clock();

  // Natural lighting system
  // Ambient - soft blue sky light
  scene.add(new THREE.AmbientLight(0x556688, 0.3));

  // Main sun - warm directional with shadows
  const sunPos = sunDir.clone().multiplyScalar(100);
  const dirLight = new THREE.DirectionalLight(0xffeedd, 1.4);
  dirLight.position.copy(sunPos);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(4096, 4096);
  dirLight.shadow.camera.near = 1;
  dirLight.shadow.camera.far = 200;
  dirLight.shadow.camera.left = -100;
  dirLight.shadow.camera.right = 100;
  dirLight.shadow.camera.top = 100;
  dirLight.shadow.camera.bottom = -100;
  dirLight.shadow.bias = -0.0004;
  dirLight.shadow.normalBias = 0.02;
  dirLight.shadow.radius = 1.5;
  scene.add(dirLight);

  // Hemisphere - sky blue top, warm ground bounce
  const hemiLight = new THREE.HemisphereLight(0x8899cc, 0x665544, 0.5);
  scene.add(hemiLight);

  // Fill light - opposite sun, cooler tone (sky bounce)
  const fillDir = sunDir.clone().multiplyScalar(-1);
  const fillLight = new THREE.DirectionalLight(0x8899bb, 0.3);
  fillLight.position.set(fillDir.x * 60, 30, fillDir.z * 60);
  scene.add(fillLight);

  // Rim light - behind camera for depth
  const rimLight = new THREE.DirectionalLight(0xffeedd, 0.15);
  rimLight.position.set(-sunDir.x * 40, 50, -sunDir.z * 40);
  scene.add(rimLight);

  // Ground bounce - warm point light near ground
  const bounceLight = new THREE.PointLight(0xddaa77, 0.12, 50);
  bounceLight.position.set(0, 0.5, 0);
  scene.add(bounceLight);

  // Generate environment cubemap for weapon reflections
  try {
    const cubeRT = new THREE.WebGLCubeRenderTarget(256, {
      format: THREE.RGBFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter
    });
    const cubeCamera = new THREE.CubeCamera(0.1, 500, cubeRT);
    cubeCamera.position.set(0, 10, 0);
    scene.add(cubeCamera);
    cubeCamera.update(renderer, scene);
    scene.environment = cubeRT.texture;
  } catch(e) {
    console.warn('[Init] CubeCamera env map failed:', e.message);
  }

  console.log('[Init] Lights added');

  buildWorld();
  console.log('[Init] World built');
  createWeaponModels();
  console.log('[Init] Weapon models created, weaponGroups.length=' + weaponGroups.length);

  window.addEventListener('resize', () => {
    if (!camera || !renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
  document.addEventListener('mousedown', e => {
    if (e.button === 0) mouseDown = true;
    if (e.button === 2) { rightMouseDown = true; isADS = true; }
  });
  document.addEventListener('mouseup', e => {
    if (e.button === 0) mouseDown = false;
    if (e.button === 2) { rightMouseDown = false; isADS = false; }
  });
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('keydown', onKeyDown);
  console.log('[Init] Event listeners added');
}

// ===================== WORLD BUILDING - DELTA FORCE STYLE =====================
function buildWorld() {
  const m = currentMap;
  const mapHalf = MAP_SIZE * CELL / 2;

  // Create terrain height map using Perlin-like noise
  terrainGeometry = createTerrainGeometry(m.terrain);
  const groundTex = createGroundTexture(m.terrain);
  let groundColor;
  if (m.terrain === 'desert') groundColor = 0xc2b280;
  else if (m.terrain === 'jungle') groundColor = 0x3d5c3d;
  else groundColor = 0x5a6a5a;

  const groundMat = new THREE.MeshStandardMaterial({
    map: groundTex,
    color: groundColor, roughness: 0.92, flatShading: false,
    vertexColors: true
  });
  terrainMesh = new THREE.Mesh(terrainGeometry, groundMat);
  terrainMesh.rotation.x = -Math.PI / 2;
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);

  // Add trees
  for (let i = 0; i < m.trees; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 40);
    const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 40);
    if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
    const y = getTerrainHeight(x, z);
    const tree = createTree(m.terrain);
    tree.position.set(x, y, z);
    tree.scale.setScalar(0.8 + Math.random() * 0.5);
    scene.add(tree);
    props.push({ mesh: tree, type: 'tree', x, z, size: 1.2 });
    worldObjects.push(tree);
  }

  // Add rocks
  for (let i = 0; i < m.rocks; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    if (Math.abs(x) < 12 && Math.abs(z) < 12) continue;
    const y = getTerrainHeight(x, z);
    const rock = createRock(m.terrain);
    rock.position.set(x, y, z);
    rock.rotation.y = Math.random() * Math.PI * 2;
    const scale = 0.5 + Math.random() * 2;
    rock.scale.setScalar(scale);
    scene.add(rock);
    props.push({ mesh: rock, type: 'rock', x, z, size: 0.8 * scale });
    worldObjects.push(rock);
  }

  // Add sandbags (tactical cover)
  for (let i = 0; i < m.sandbags; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 40);
    const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 40);
    if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
    const y = getTerrainHeight(x, z);
    const sandbag = createSandbagWall();
    sandbag.position.set(x, y, z);
    sandbag.rotation.y = Math.random() * Math.PI * 2;
    scene.add(sandbag);
    covers.push({ x, z, w: 2, d: 0.5, rotY: sandbag.rotation.y });
    worldObjects.push(sandbag);
  }

  // Buildings / bunkers
  for (let i = 0; i < m.buildings + m.bunkers; i++) {
    const w = 5 + Math.random() * 8;
    const h = i < m.buildings ? 5 + Math.random() * 10 : 2 + Math.random() * 3;
    const d = 5 + Math.random() * 8;
    let x, z, tries = 0;
    do {
      x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 60);
      z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 60);
      tries++;
    } while (tries < 50 && (Math.abs(x) < 20 && Math.abs(z) < 20));
    const y = getTerrainHeight(x, z);
    // 随机选择建筑类型
    const buildingTypes = [createBuilding, createWarehouse, createTower, createRuins, createHouse];
    const bunkerTypes = [createBunker, createRuins];
    let building;
    if (i < m.buildings) {
      const typeFn = buildingTypes[Math.floor(Math.random() * buildingTypes.length)];
      building = typeFn(w, h, d);
    } else {
      const typeFn = bunkerTypes[Math.floor(Math.random() * bunkerTypes.length)];
      building = typeFn(w, h, d);
    }
    building.position.set(x, y + h / 2, z);
    scene.add(building);
    buildings.push({ x, z, w: w / 2, d: d / 2, h });
    worldObjects.push(building);
  }

  // Trenches (if enabled)
  if (m.trenches) createTrenches(m.trenches);

  // River - 河道系统
  createRiver();

  // Extraction zones - 2 groups × 4 points
  const group1X = (Math.random() > 0.5 ? 1 : -1) * (mapHalf * 0.7);
  const group1Z = (Math.random() - 0.5) * mapHalf * 0.6;
  const group2X = -group1X;
  const group2Z = (Math.random() - 0.5) * mapHalf * 0.6;
  for (let g = 0; g < 2; g++) {
    const cx = g === 0 ? group1X : group2X;
    const cz = g === 0 ? group1Z : group2Z;
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2 + Math.random() * 0.3;
      const dist = 12 + Math.random() * 8;
      const ex = cx + Math.cos(angle) * dist;
      const ez = cz + Math.sin(angle) * dist;
      const ey = getTerrainHeight(ex, ez);
      const zone = createExtractZone(ex, ez);
      zone.position.y = ey;
      scene.add(zone);
      extractZones.push(zone);
    }
  }

  // Containers / supply boxes
  for (let i = 0; i < m.bunkers + 3; i++) {
    let x, z, tries = 0;
    do {
      x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 50);
      z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 50);
      tries++;
    } while (tries < 50 && (Math.abs(x) < 15 && Math.abs(z) < 15));
    const y = getTerrainHeight(x, z);
    const container = createContainer();
    container.position.set(x, y + 0.5, z);
    scene.add(container);
    const r = Math.random();
    const containerType = r < 0.5 ? 'normal' : r < 0.7 ? 'ammo_crate' : r < 0.85 ? 'gear_crate' : 'safe';
    containers.push({ mesh: container, searched: false, loot: Math.floor(Math.random() * 3) + 1, x, z, type: containerType });
    worldObjects.push(container);
  }

  // Grass patches - 顶配草地系统
  if (m.terrain !== 'desert') {
    createGrassSystem(m.terrain);
  }

  // Dust particles - 大气灰尘效果
  createDustParticles();

  // Debris and small props - 碎片和小道具
  for (let i = 0; i < 50; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
    const y = getTerrainHeight(x, z);
    const debris = createDebris();
    debris.position.set(x, y + 0.1, z);
    scene.add(debris);
  }

  // Water puddles - 水坑
  if (m.terrain !== 'desert') {
    for (let i = 0; i < 15; i++) {
      const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 40);
      const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 40);
      if (Math.abs(x) < 15 && Math.abs(z) < 15) continue;
      const y = getTerrainHeight(x, z);
      const puddle = createWaterPuddle();
      puddle.position.set(x, y + 0.02, z);
      scene.add(puddle);
    }
  }

  // Supply crates - 补给箱
  for (let i = 0; i < 20; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
    const y = getTerrainHeight(x, z);
    const crate = createSupplyCrate();
    crate.position.set(x, y + 0.3, z);
    crate.rotation.y = Math.random() * Math.PI * 2;
    scene.add(crate);
  }

  // Barrels - 油桶
  for (let i = 0; i < 15; i++) {
    const x = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    const z = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
    const y = getTerrainHeight(x, z);
    const barrel = createBarrel();
    barrel.position.set(x, y + 0.4, z);
    barrel.rotation.y = Math.random() * Math.PI * 2;
    scene.add(barrel);
  }
}

// 简化的2D噪声函数
function noise2D(x, z, scale) {
  const nx = x * scale, nz = z * scale;
  return (Math.sin(nx) * Math.cos(nz) +
    Math.sin(nx * 2.3 + nz * 3.1) * 0.5 +
    Math.sin(nx * 5.1 - nz * 2.7) * 0.25) / 1.75;
}

// 获取地形高度
function getTerrainHeight(x, z) {
  const mapScale = 0.008;
  let h = noise2D(x, z, mapScale) * 0.8;
  h += noise2D(x, z, mapScale * 4) * 0.2;
  h += noise2D(x, z, mapScale * 12) * 0.05;
  return h;
}

// 创建地形几何
function createTerrainGeometry(terrainType) {
  const size = MAP_SIZE * CELL;
  const seg = 100;
  const geo = new THREE.PlaneGeometry(size, size, seg, seg);
  const pos = geo.attributes.position;
  const colors = [];

  let baseColor;
  if (terrainType === 'desert') baseColor = new THREE.Color(0xc2b280);
  else if (terrainType === 'jungle') baseColor = new THREE.Color(0x3d5c3d);
  else baseColor = new THREE.Color(0x5a6a5a);

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const h = getTerrainHeight(x, y);
    pos.setZ(i, h);

    // 高度相关颜色
    const c = baseColor.clone();
    const tint = (h + 3) / 6;
    c.offsetHSL(0, 0, (tint - 0.5) * 0.2);
    // 随机变化
    c.r += (Math.random() - 0.5) * 0.05;
    c.g += (Math.random() - 0.5) * 0.05;
    c.b += (Math.random() - 0.5) * 0.05;
    colors.push(c.r, c.g, c.b);
  }

  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  return geo;
}

// 创建树木 - 顶配真实树木
function createTree(terrainType) {
  const g = new THREE.Group();

  // Realistic bark texture
  function createBarkTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    // Base bark color
    ctx.fillStyle = '#3d2b1f';
    ctx.fillRect(0, 0, 256, 256);
    // Vertical bark grooves
    for (let i = 0; i < 60; i++) {
      const x = Math.random() * 256;
      const w = 1 + Math.random() * 3;
      const h = 40 + Math.random() * 200;
      const y = Math.random() * 256;
      ctx.fillStyle = `rgba(${20 + Math.random() * 30}, ${15 + Math.random() * 20}, ${10 + Math.random() * 15}, ${0.3 + Math.random() * 0.5})`;
      ctx.fillRect(x, y, w, h);
    }
    // Bark highlights (lichen/moss patches)
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * 256;
      const y = Math.random() * 256;
      const r = 3 + Math.random() * 8;
      ctx.fillStyle = `rgba(${80 + Math.random() * 40}, ${90 + Math.random() * 40}, ${60 + Math.random() * 30}, ${0.2 + Math.random() * 0.3})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    // Dark cracks
    for (let i = 0; i < 15; i++) {
      const x = Math.random() * 256;
      const y = Math.random() * 256;
      ctx.strokeStyle = `rgba(10, 5, 0, ${0.4 + Math.random() * 0.4})`;
      ctx.lineWidth = 0.5 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + (Math.random() - 0.5) * 20, y + 10 + Math.random() * 40);
      ctx.stroke();
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  // Leaf texture with veins
  function createLeafTexture(baseColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    const c = new THREE.Color(baseColor);
    ctx.fillStyle = `rgb(${c.r * 255 | 0}, ${c.g * 255 | 0}, ${c.b * 255 | 0})`;
    ctx.fillRect(0, 0, 128, 128);
    // Leaf vein pattern
    for (let i = 0; i < 30; i++) {
      const x = Math.random() * 128;
      const y = Math.random() * 128;
      ctx.strokeStyle = `rgba(${c.r * 180 | 0}, ${c.g * 200 | 0}, ${c.b * 150 | 0}, 0.3)`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + (Math.random() - 0.5) * 30, y + (Math.random() - 0.5) * 30);
      ctx.stroke();
    }
    // Light spots (sunlight through leaves)
    for (let i = 0; i < 10; i++) {
      const x = Math.random() * 128;
      const y = Math.random() * 128;
      const r = 2 + Math.random() * 5;
      ctx.fillStyle = `rgba(255, 255, 200, ${0.05 + Math.random() * 0.1})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  const barkTex = createBarkTexture();
  let trunkColor = 0x5d4037;
  let leafColor = terrainType === 'desert' ? 0x6b8e23 : 0x2e7d32;
  const leafTex = createLeafTexture(leafColor);

  // Bark material with normal-like effect
  const barkMat = new THREE.MeshStandardMaterial({
    map: barkTex,
    color: trunkColor,
    roughness: 0.95,
    metalness: 0.0,
    bumpMap: barkTex,
    bumpScale: 0.05
  });

  // Main trunk - tapered cylinder with more segments
  const trunkHeight = 3.0 + Math.random() * 1.5;
  const trunkGeo = new THREE.CylinderGeometry(0.1, 0.25, trunkHeight, 12);
  // Add slight trunk curve by displacing vertices
  const trunkPos = trunkGeo.attributes.position;
  for (let i = 0; i < trunkPos.count; i++) {
    const x = trunkPos.getX(i);
    const y = trunkPos.getY(i);
    const z = trunkPos.getZ(i);
    const curve = Math.sin(y / trunkHeight * Math.PI) * 0.15;
    trunkPos.setX(i, x + curve);
    trunkPos.setZ(i, z + curve * 0.5);
  }
  trunkGeo.computeVertexNormals();
  const trunk = new THREE.Mesh(trunkGeo, barkMat);
  trunk.position.y = trunkHeight / 2;
  trunk.castShadow = true;
  trunk.receiveShadow = true;
  g.add(trunk);

  // Exposed roots at base
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.3;
    const rootLen = 0.4 + Math.random() * 0.4;
    const rootGeo = new THREE.CylinderGeometry(0.02, 0.06, rootLen, 6);
    const root = new THREE.Mesh(rootGeo, barkMat);
    root.position.set(Math.cos(angle) * 0.2, 0.1, Math.sin(angle) * 0.2);
    root.rotation.z = Math.cos(angle) * 1.2;
    root.rotation.x = Math.sin(angle) * 1.2;
    root.castShadow = true;
    g.add(root);
  }

  // Main branches (first level)
  const branchCount = 4 + Math.floor(Math.random() * 3);
  const branchEndpoints = [];
  for (let i = 0; i < branchCount; i++) {
    const branchAngle = (i / branchCount) * Math.PI * 2 + Math.random() * 0.5;
    const branchHeight = trunkHeight * (0.5 + Math.random() * 0.3);
    const branchLen = 0.8 + Math.random() * 0.8;
    const branchThick = 0.04 + Math.random() * 0.04;

    const branchGeo = new THREE.CylinderGeometry(branchThick * 0.4, branchThick, branchLen, 6);
    const branch = new THREE.Mesh(branchGeo, barkMat);
    const bx = Math.cos(branchAngle) * (0.15 + branchLen * 0.3);
    const bz = Math.sin(branchAngle) * (0.15 + branchLen * 0.3);
    branch.position.set(bx, branchHeight, bz);
    branch.rotation.z = Math.cos(branchAngle) * 0.7;
    branch.rotation.x = Math.sin(branchAngle) * 0.7;
    branch.castShadow = true;
    g.add(branch);

    branchEndpoints.push({
      x: bx + Math.cos(branchAngle) * branchLen * 0.5,
      y: branchHeight + 0.3,
      z: bz + Math.sin(branchAngle) * branchLen * 0.5
    });

    // Sub-branches (second level)
    for (let j = 0; j < 2; j++) {
      const subAngle = branchAngle + (Math.random() - 0.5) * 1.0;
      const subLen = 0.3 + Math.random() * 0.4;
      const subGeo = new THREE.CylinderGeometry(0.01, branchThick * 0.5, subLen, 5);
      const sub = new THREE.Mesh(subGeo, barkMat);
      const sx = bx + Math.cos(subAngle) * 0.2;
      const sz = bz + Math.sin(subAngle) * 0.2;
      sub.position.set(sx, branchHeight + 0.2 + j * 0.2, sz);
      sub.rotation.z = Math.cos(subAngle) * 0.8;
      sub.rotation.x = Math.sin(subAngle) * 0.8;
      sub.castShadow = true;
      g.add(sub);

      branchEndpoints.push({
        x: sx + Math.cos(subAngle) * subLen * 0.4,
        y: branchHeight + 0.4 + j * 0.2,
        z: sz + Math.sin(subAngle) * subLen * 0.4
      });
    }
  }

  // Leaf material - double-sided with subsurface scattering appearance
  const leafBaseMat = new THREE.MeshStandardMaterial({
    map: leafTex,
    color: leafColor,
    roughness: 0.75,
    metalness: 0.0,
    side: THREE.DoubleSide,
    transparent: true,
    alphaTest: 0.1
  });

  // Darker leaf variant for depth
  const darkLeafColor = new THREE.Color(leafColor).multiplyScalar(0.6);
  const darkLeafMat = new THREE.MeshStandardMaterial({
    color: darkLeafColor,
    roughness: 0.8,
    side: THREE.DoubleSide,
    transparent: true,
    alphaTest: 0.1
  });

  // Lighter leaf variant for sun-facing areas
  const lightLeafColor = new THREE.Color(leafColor).lerp(new THREE.Color(0x88cc44), 0.3);
  const lightLeafMat = new THREE.MeshStandardMaterial({
    color: lightLeafColor,
    roughness: 0.7,
    side: THREE.DoubleSide,
    transparent: true,
    alphaTest: 0.1
  });

  if (terrainType === 'desert') {
    // Sparse desert foliage - flat-topped acacia style
    for (let i = 0; i < 6; i++) {
      const size = 0.8 + Math.random() * 0.6;
      const leafGeo = new THREE.SphereGeometry(size, 10, 8);
      // Flatten the bottom
      const lp = leafGeo.attributes.position;
      for (let j = 0; j < lp.count; j++) {
        if (lp.getY(j) < 0) lp.setY(j, lp.getY(j) * 0.3);
      }
      leafGeo.computeVertexNormals();
      const mat = i % 3 === 0 ? darkLeafMat : (i % 3 === 1 ? lightLeafMat : leafBaseMat);
      const leaf = new THREE.Mesh(leafGeo, mat);
      leaf.position.set(
        (Math.random() - 0.5) * 2,
        trunkHeight * 0.7 + Math.random() * 1,
        (Math.random() - 0.5) * 2
      );
      leaf.scale.y = 0.4 + Math.random() * 0.3;
      leaf.castShadow = true;
      leaf.receiveShadow = true;
      g.add(leaf);
    }
  } else {
    // Dense foliage - realistic canopy with multiple layers
    // Layer 1: Inner canopy (dark, dense)
    for (let i = 0; i < 8; i++) {
      const size = 0.6 + Math.random() * 0.8;
      const leafGeo = new THREE.IcosahedronGeometry(size, 1);
      // Deform for organic shape
      const lp = leafGeo.attributes.position;
      for (let j = 0; j < lp.count; j++) {
        const noise = Math.sin(lp.getX(j) * 3) * Math.cos(lp.getZ(j) * 2) * 0.2;
        lp.setX(j, lp.getX(j) * (0.8 + Math.random() * 0.4 + noise));
        lp.setY(j, lp.getY(j) * (0.6 + Math.random() * 0.3));
        lp.setZ(j, lp.getZ(j) * (0.8 + Math.random() * 0.4 + noise));
      }
      leafGeo.computeVertexNormals();
      const leaf = new THREE.Mesh(leafGeo, darkLeafMat);
      const ep = branchEndpoints[i % branchEndpoints.length];
      leaf.position.set(
        ep.x + (Math.random() - 0.5) * 0.5,
        ep.y + Math.random() * 0.5,
        ep.z + (Math.random() - 0.5) * 0.5
      );
      leaf.castShadow = true;
      leaf.receiveShadow = true;
      g.add(leaf);
    }

    // Layer 2: Mid canopy (standard green)
    for (let i = 0; i < 10; i++) {
      const size = 0.5 + Math.random() * 1.0;
      const leafGeo = new THREE.IcosahedronGeometry(size, 1);
      const lp = leafGeo.attributes.position;
      for (let j = 0; j < lp.count; j++) {
        const noise = Math.sin(lp.getX(j) * 2.5 + i) * Math.cos(lp.getZ(j) * 3) * 0.25;
        lp.setX(j, lp.getX(j) * (0.7 + Math.random() * 0.5 + noise));
        lp.setY(j, lp.getY(j) * (0.5 + Math.random() * 0.4));
        lp.setZ(j, lp.getZ(j) * (0.7 + Math.random() * 0.5 + noise));
      }
      leafGeo.computeVertexNormals();
      const leaf = new THREE.Mesh(leafGeo, leafBaseMat);
      const angle = Math.random() * Math.PI * 2;
      const dist = 0.5 + Math.random() * 1.5;
      leaf.position.set(
        Math.cos(angle) * dist,
        trunkHeight * 0.6 + Math.random() * trunkHeight * 0.5,
        Math.sin(angle) * dist
      );
      leaf.castShadow = true;
      leaf.receiveShadow = true;
      g.add(leaf);
    }

    // Layer 3: Outer canopy (light green, sun-facing)
    for (let i = 0; i < 8; i++) {
      const size = 0.4 + Math.random() * 0.7;
      const leafGeo = new THREE.IcosahedronGeometry(size, 1);
      const lp = leafGeo.attributes.position;
      for (let j = 0; j < lp.count; j++) {
        lp.setX(j, lp.getX(j) * (0.6 + Math.random() * 0.6));
        lp.setY(j, lp.getY(j) * (0.4 + Math.random() * 0.4));
        lp.setZ(j, lp.getZ(j) * (0.6 + Math.random() * 0.6));
      }
      leafGeo.computeVertexNormals();
      const leaf = new THREE.Mesh(leafGeo, lightLeafMat);
      const angle = Math.random() * Math.PI * 2;
      const dist = 1.0 + Math.random() * 1.8;
      leaf.position.set(
        Math.cos(angle) * dist,
        trunkHeight * 0.7 + Math.random() * trunkHeight * 0.4,
        Math.sin(angle) * dist
      );
      leaf.castShadow = true;
      leaf.receiveShadow = true;
      g.add(leaf);
    }

    // Top canopy crown
    for (let i = 0; i < 5; i++) {
      const size = 0.5 + Math.random() * 0.5;
      const leafGeo = new THREE.SphereGeometry(size, 8, 6);
      const lp = leafGeo.attributes.position;
      for (let j = 0; j < lp.count; j++) {
        lp.setX(j, lp.getX(j) * (0.7 + Math.random() * 0.4));
        lp.setZ(j, lp.getZ(j) * (0.7 + Math.random() * 0.4));
      }
      leafGeo.computeVertexNormals();
      const leaf = new THREE.Mesh(leafGeo, lightLeafMat);
      leaf.position.set(
        (Math.random() - 0.5) * 1,
        trunkHeight + Math.random() * 0.8,
        (Math.random() - 0.5) * 1
      );
      leaf.castShadow = true;
      g.add(leaf);
    }
  }

  return g;
}

// 创建岩石 - 更真实的岩石
function createRock(terrainType) {
  const g = new THREE.Group();
  const concreteTex = createConcreteTexture();
  let rockColor = terrainType === 'desert' ? 0x8d7b6b : 0x5a5a5a;

  // Main rock body
  const rockGeo = new THREE.DodecahedronGeometry(1, 2);
  const pos = rockGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const noise = Math.sin(x * 3) * Math.cos(z * 2) * 0.2;
    const factor = 0.7 + Math.random() * 0.5 + noise;
    pos.setX(i, x * factor);
    pos.setY(i, y * (0.4 + Math.random() * 0.5));
    pos.setZ(i, z * factor);
  }
  rockGeo.computeVertexNormals();

  const rockMat = new THREE.MeshStandardMaterial({ map: concreteTex, color: rockColor, roughness: 0.95 });
  const rock = new THREE.Mesh(rockGeo, rockMat);
  rock.castShadow = true; rock.receiveShadow = true;
  g.add(rock);

  // Smaller rocks around base
  for (let i = 0; i < 3; i++) {
    const smallGeo = new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.2, 1);
    const smallRock = new THREE.Mesh(smallGeo, rockMat);
    const angle = (i / 3) * Math.PI * 2 + Math.random();
    smallRock.position.set(Math.cos(angle) * 1.2, -0.3, Math.sin(angle) * 1.2);
    smallRock.rotation.set(Math.random(), Math.random(), Math.random());
    g.add(smallRock);
  }

  return g;
}

// 创建沙袋墙 - 更真实的沙袋
function createSandbagWall() {
  const g = new THREE.Group();

  const darkSandMat = new THREE.MeshStandardMaterial({ color: 0x7a6b5a, roughness: 0.95 });

  // 多层沙袋，错落排列
  for (let row = 0; row < 3; row++) {

      const bagGeo = new THREE.BoxGeometry(0.5, 0.2, 0.25);
      const mat = Math.random() > 0.5 ? sandMat : darkSandMat;
      const bag = new THREE.Mesh(bagGeo, mat);
      bag.position.set((i - (bagsInRow - 1) / 2) * 0.52 + offset, 0.1 + row * 0.22, (row % 2) * 0.13 - 0.06);
      bag.rotation.z = (Math.random() - 0.5) * 0.05;

// 创建掩体 - 更真实的掩体
function createBunker(w, h, d) {
  const g = new THREE.Group();
  const concreteTex = createConcreteTexture();
  const concreteMat = new THREE.MeshStandardMaterial({ map: concreteTex, color: 0x5a5a5a, roughness: 0.95 });

  // Main body
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), concreteMat);
  body.castShadow = true; body.receiveShadow = true;
  g.add(body);

  // Sandbag top
  const sandMat = new THREE.MeshStandardMaterial({ color: 0x968975, roughness: 0.95 });
  for (let i = 0; i < Math.floor(w / 0.6); i++) {
    const bag = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.25), sandMat);
    bag.position.set((i - Math.floor(w / 0.6) / 2) * 0.55, h / 2 + 0.1, 0);
    bag.rotation.z = (Math.random() - 0.5) * 0.1;
    g.add(bag);
  }

  // 射击孔 with inner darkness
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 1 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8, metalness: 0.5 });
  for (let i = -1; i <= 1; i += 2) {
    // Dark interior
    const hole = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.45, 0.6), holeMat);
    hole.position.set(i * w * 0.3, 0.3, d * 0.4);
    g.add(hole);
    // Metal frame
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.55, 0.1), frameMat);
    frame.position.set(i * w * 0.3, 0.3, d * 0.48);
    g.add(frame);
  }

  // Door opening
  const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 0.1), frameMat);
  doorFrame.position.set(0, -h / 2 + 1, d / 2 + 0.05);
  g.add(doorFrame);

  // Roof edge
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
  const roofEdge = new THREE.Mesh(new THREE.BoxGeometry(w + 0.2, 0.15, d + 0.2), edgeMat);
  roofEdge.position.y = h / 2;
  g.add(roofEdge);

  return g;
}

// 草地系统 - 十字形叶片 + 合并几何体 (高性能)
function createGrassSystem(terrainType) {
  const baseColor = terrainType === 'jungle' ? 0x2a5518 : 0x3d6b2a;
  const darkColor = terrainType === 'jungle' ? 0x1a3a0e : 0x2d5520;
  const tipColor = terrainType === 'jungle' ? 0x5a9a3a : 0x7ab858;

  const grassMat = new THREE.MeshStandardMaterial({
    color: baseColor, roughness: 0.85, metalness: 0.0,
    side: THREE.DoubleSide, vertexColors: true
  });

  const clusterCount = 800;
  const positions = [];
  const colors = [];
  const indices = [];
  let vertOffset = 0;

  const baseCol = new THREE.Color(baseColor);
  const darkCol = new THREE.Color(darkColor);
  const tipCol = new THREE.Color(tipColor);

  for (let c = 0; c < clusterCount; c++) {
    const cx = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    const cz = (Math.random() - 0.5) * (MAP_SIZE * CELL - 30);
    if (Math.abs(cx) < 12 && Math.abs(cz) < 12) continue;

    const cy = getTerrainHeight(cx, cz);
    const h1 = getTerrainHeight(cx + 0.5, cz);
    const h2 = getTerrainHeight(cx, cz + 0.5);
    if (Math.abs(h1 - cy) + Math.abs(h2 - cy) > 0.15) continue;

    const bladeCount = 5 + Math.floor(Math.random() * 5);
    for (let b = 0; b < bladeCount; b++) {
      const height = 0.25 + Math.random() * 0.45;
      const width = 0.025 + Math.random() * 0.02;
      const bx = cx + (Math.random() - 0.5) * 0.5;
      const bz = cz + (Math.random() - 0.5) * 0.5;
      const rotY = Math.random() * Math.PI;
      const lean = (Math.random() - 0.5) * 0.2;
      const col = new THREE.Color().lerpColors(darkCol, baseCol, Math.random());

      // Cross-shaped: two perpendicular planes per blade
      for (let plane = 0; plane < 2; plane++) {
        const angle = rotY + plane * Math.PI / 2;
        const cosA = Math.cos(angle);
        const sinA = Math.sin(angle);

        // Bottom-left, bottom-right, top-center (triangle)
        const x0 = bx - cosA * width;
        const z0 = bz - sinA * width;
        const x1 = bx + cosA * width;
        const z1 = bz + sinA * width;
        const x2 = bx + lean * height;
        const z2 = bz;

        positions.push(x0, cy, z0);
        positions.push(x1, cy, z1);
        positions.push(x2, cy + height, z2);

        // Bottom color (darker), tip color (lighter green)
        colors.push(darkCol.r, darkCol.g, darkCol.b);
        colors.push(col.r, col.g, col.b);
        colors.push(tipCol.r, tipCol.g, tipCol.b);

        indices.push(vertOffset, vertOffset + 1, vertOffset + 2);
        vertOffset += 3;
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const grassMesh = new THREE.Mesh(geo, grassMat);
  grassMesh.frustumCulled = false;
  grassMesh.userData.isGrass = true;
  grassMesh.userData.basePositions = positions.slice();
  scene.add(grassMesh);
  window._grassMesh = grassMesh;
}

// 创建大气灰尘效果

    dustVelocities.push({
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.2,
      vz: (Math.random() - 0.5) * 0.5
    });
  }

  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
  const dustMat = new THREE.PointsMaterial({
    color: 0xccbb99,
    size: 0.3,
    transparent: true,
    opacity: 0.4,
    depthWrite: false
  });
